}
function renderStatsInto(el){
  if(!el)return;
  const total=meds.length;
  const expNow=meds.filter(m=>{const d=daysLeft(m.expiryDate);return d!==null&&d<0;});
  const soon=meds.filter(m=>{const d=daysLeft(m.expiryDate);return d!==null&&d>=0&&d<30;});
  const noDate=meds.filter(m=>!m.expiryDate);
  const lowSt=meds.filter(m=>m.lowStock);
  const totalU=meds.reduce((s,m)=>s+m.count,0);
  const kpis=[{icon:"💊",lbl:"Medikamente",val:total,col:"var(--accent)",meds},{icon:"🚨",lbl:"Abgelaufen",val:expNow.length,col:expNow.length?"var(--red)":"var(--muted)",meds:expNow},{icon:"⏳",lbl:"< 30 Tage",val:soon.length,col:soon.length?"var(--amber)":"var(--muted)",meds:soon},{icon:"⚠️",lbl:"Fast leer",val:lowSt.length,col:lowSt.length?"var(--red)":"var(--muted)",meds:lowSt},{icon:"📅",lbl:"Kein MHD",val:noDate.length,col:noDate.length?"var(--amber)":"var(--muted)",meds:noDate},{icon:"📦",lbl:"Einheiten ges.",val:totalU,col:"var(--green)",meds}];
  const unitMap={};UNITS.forEach(u=>{const items=meds.filter(m=>m.unit===u);const c=items.reduce((s,m)=>s+m.count,0);if(c>0)unitMap[u]={count:c,items};});
  // Tortendiagramm – nur Gruppen mit Medikamenten
  const pieData=groups.map(g=>{const c=meds.filter(m=>m.groupId===g.id).length;return c>0?{name:g.name,val:c,color:g.color,emoji:g.emoji,id:g.id}:null;}).filter(Boolean);
  let pieSvg="";
  if(pieData.length&&total>0){
    let startAngle=-Math.PI/2;const R=80,cx=100,cy=100;const paths=[];
    pieData.forEach(d=>{
      const angle=2*Math.PI*(d.val/total);const endAngle=startAngle+angle;
      const pct=Math.round(d.val/total*100);
      let lblHtml="";const mid=startAngle+angle/2;
      if(pct>=8){const lx=cx+60*Math.cos(mid),ly=cy+60*Math.sin(mid);lblHtml=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="white">${pct}%</text>`;}
      // SVG arc funktioniert nicht bei 360° (exakt 1 Segment) → Kreis verwenden
      if(angle>=Math.PI*1.9999){
        paths.push(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${d.color}" style="cursor:pointer" onclick="showStatDetail('${d.id}','${h(d.name)}')" title="${h(d.name)}: ${d.val}"/>${lblHtml}`);
      }else{
        const x1=cx+R*Math.cos(startAngle),y1=cy+R*Math.sin(startAngle);
        const x2=cx+R*Math.cos(endAngle),y2=cy+R*Math.sin(endAngle);
        const large=angle>Math.PI?1:0;
        paths.push(`<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${d.color}" style="cursor:pointer" onclick="showStatDetail('${d.id}','${h(d.name)}')" title="${h(d.name)}: ${d.val}"/>${lblHtml}`);
      }
      startAngle=endAngle;
    });
    pieSvg=`<svg viewBox="0 0 200 200" style="max-width:200px;display:block;margin:0 auto">${paths.join("")}</svg>`;
  }
  const archiveCount=(LS.get("sdro_archive")||[]).length;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:15px;font-weight:700">Statistik</div><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="showArchive()" style="font-size:11px">📋 Archiv</button><button class="btn btn-primary btn-sm" onclick="closeModal();showBestandsfuehrung()" style="font-size:11px">📋 Bestandsführung</button></div></div>`;
  html+=`<div class="grid3" style="margin-bottom:14px">`;
  kpis.forEach((k,i)=>{
    const hasDet=k.meds&&k.meds.length>0;
    html+=`<div class="kpi card" ${hasDet?`onclick="showStatDetail(null,'${h(k.lbl)}',${i})"`:""}><div style="font-size:22px;margin-bottom:6px">${k.icon}</div><div class="kpi-num" style="color:${k.col}">${k.val}</div><div class="kpi-lbl">${h(k.lbl)}</div>${hasDet?'<div class="kpi-hint">Details ›</div>':""}</div>`;
  });
  html+=`</div>`;
  if(Object.keys(unitMap).length){
    const uIcon=u=>u==="Packung"?"📦":u==="Blister"?"💊":u==="Flasche"?"🧴":u==="Tube"?"🪥":u==="Spray"?"💨":u==="Ampulle"?"💉":u==="Tablette"?"💊":u==="Kapsel"?"💊":"📋";
    html+=`<div class="card" style="padding:14px;margin-bottom:12px"><div style="font-weight:600;font-size:13px;color:var(--accent);margin-bottom:10px">Einheiten nach Typ</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">`;
    Object.entries(unitMap).forEach(([u,{count,items}])=>{html+=`<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="showStatDetail(null,'${h(u)}',null,'${u}')"><span style="font-size:20px">${uIcon(u)}</span><div><div style="font-weight:700;font-size:16px;line-height:1">${count}</div><div style="font-size:10px;color:var(--muted)">${h(u)}</div></div></div>`;});
    html+=`</div></div>`;
  }
  if(pieData.length){
    html+=`<div class="card" style="padding:14px;margin-bottom:12px"><div style="font-weight:600;font-size:13px;color:var(--accent);margin-bottom:10px">Verteilung nach Gruppen</div>${pieSvg}</div>`;
    html+=`<div class="card" style="padding:14px;margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-weight:600;font-size:13px;color:var(--accent)">Gruppenübersicht</div><button class="btn btn-ghost btn-sm" onclick="openGrpModal()" style="font-size:11px">+ Neue Gruppe</button></div>`;
    groups.forEach(g=>{
      const cnt=meds.filter(m=>m.groupId===g.id).length;const pct=total>0&&cnt>0?Math.round(cnt/total*100):0;
      html+=`<div style="margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="showStatDetail('${g.id}','${h(g.name)}')"><span style="font-size:16px">${h(g.emoji)}</span><span style="width:10px;height:10px;border-radius:50%;background:${g.color};flex-shrink:0;display:inline-block"></span><span style="font-size:13px;font-weight:600;color:var(--text)">${h(g.name)}</span><span style="font-size:11px;color:var(--muted)">${cnt} Med.</span></div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0">${cnt>0?`<span style="background:${g.color};color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">${pct}%</span>`:'<span style="font-size:10px;color:var(--muted)">leer</span>'}<button class="btn btn-sm" style="padding:3px 8px;font-size:11px" onclick="openGrpModal(${JSON.stringify(g).replace(/"/g,'&quot;')},true)">✏️</button><button class="btn btn-sm" style="padding:3px 8px;font-size:11px;background:var(--redlo);color:var(--red)" onclick="deleteGroupFromStats('${g.id}','${h(g.name)}',${cnt})">🗑️</button></div></div>${cnt>0?`<div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:${g.color};box-shadow:0 0 0 1px ${g.color}55"></div></div>`:'<div style="height:5px;background:var(--faint);border-radius:3px"></div>'}</div>`;
    });
    html+=`</div>`;
    const warn=[{lbl:"Abgelaufen",list:expNow,col:"var(--red)",bg:"var(--redlo)"},{lbl:"< 30 Tage",list:soon,col:"var(--amber)",bg:"var(--amberlo)"},{lbl:"Kein MHD",list:noDate,col:"var(--muted)",bg:"var(--faint)"}].filter(x=>x.list.length);
    warn.forEach(({lbl,list,col,bg})=>{html+=`<div class="card" style="padding:10px 12px;margin-bottom:8px;background:${bg};border:1px solid ${col}44"><div style="font-size:11px;font-weight:700;color:${col};margin-bottom:3px">${lbl} (${list.length})</div><div style="font-size:11px;color:var(--muted)">${list.map(m=>h(m.name)).join(", ")}</div></div>`;});
  }
  if(!total)html+=`<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:44px;margin-bottom:10px">📊</div><div style="font-size:13px">Noch keine Daten</div></div>`;
  el.innerHTML=html;
}

// Alle Medikamente mit PZN validieren (manuell aus Settings)
async function runPZNValidationAll(){
  // Alle Meds prüfen – mit und ohne PZN (Daten + Bilder nachladen)
  const skipped=LS.get("sdro_skip_val")||[];
  const toCheck=meds.filter(m=>!skipped.includes(m.id));
  if(!toCheck.length){toast("Keine Medikamente zu prüfen","info");return;}
  if(!apiKey||!apiKey.startsWith("sk-ant-")){toast("Bitte zuerst API-Schlüssel eingeben","warn");setView("settings");return;}
  // Fortschritts-Modal öffnen
  openModal(`<div style="text-align:center;padding:10px 0">
    <div style="font-size:28px;margin-bottom:10px">🔍</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">PZN-Validierung läuft</div>
    <div id="pzn-prog-lbl" style="font-size:12px;color:var(--muted);margin-bottom:14px">Starte...</div>
    <div style="background:var(--faint);border-radius:20px;height:10px;overflow:hidden;margin-bottom:14px">
      <div id="pzn-prog-bar" style="height:100%;border-radius:20px;background:var(--accent);width:0%;transition:width .4s ease"></div>
    </div>
    <div id="pzn-prog-results" style="max-height:200px;overflow-y:auto;text-align:left;font-size:12px"></div>
  </div>`,"center-overlay",false);
  const total=toCheck.length;
  let done=0;let okCount=0;let conflictCount=0;
  const resultsEl=()=>document.getElementById("pzn-prog-results");
  const barEl=()=>document.getElementById("pzn-prog-bar");
  const lblEl=()=>document.getElementById("pzn-prog-lbl");
  const updateProgress=(name,status)=>{
    done++;
    const pct=Math.round(done/total*100);
    if(barEl())barEl().style.width=pct+"%";
    if(lblEl())lblEl().textContent=`${done} / ${total} geprüft`;
    if(resultsEl()){
      const icon=status==="ok"?"✅":status==="conflict"?"⚠️":status==="cached"?"💾":"❓";
      const color=status==="ok"?"var(--green)":status==="conflict"?"var(--amber)":"var(--muted)";
      const lbl=status==="ok"?"OK":status==="conflict"?"Unstimmigkeit":status==="cached"?"Aus Cache":"Keine Daten";
      resultsEl().innerHTML+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><span>${icon}</span><span style="flex:1;font-weight:500">${h(name)}</span><span style="color:${color};font-size:10px;font-weight:600">${lbl}</span></div>`;
      resultsEl().scrollTop=resultsEl().scrollHeight;
    }
    if(status==="ok"||status==="cached")okCount++;
    if(status==="conflict")conflictCount++;
  };
  // Nacheinander prüfen (1 gleichzeitig um API-Limits zu respektieren)
  for(const med of toCheck){
    if(lblEl())lblEl().textContent=`Prüfe: ${med.name}...`;
    // Zuerst im Cache nachschauen
    const cached=lookupPZNInCache(med.pzn);
    if(cached){
      // Aus Cache: Status direkt setzen ohne API
      const norm=s=>(s||"").toLowerCase().replace(/[^a-z0-9äöüß]/g,"");
      const srcWords=(cached.name||"").split(/\s+/).filter(w=>w.length>3);
      const medWords=(med.name||"").split(/\s+/).filter(w=>w.length>3);
      const nameOk=!cached.name||srcWords.some(w=>norm(med.name).includes(norm(w)))||medWords.some(w=>norm(cached.name||"").includes(norm(w)));
      const status=nameOk?"cached":"conflict";
      if(status==="cached"){
        meds=meds.map(m=>m.id===med.id?{...m,pznStatus:"ok",pznChecked:td()}:m);
        save();
      }
      updateProgress(med.name,status);
      await new Promise(r=>setTimeout(r,100)); // Kurze Pause für UI-Update
      continue;
    }
    // checkMed aufrufen (vereinte Prüfung)
    await checkMed(med.id,{silent:true,fetchImage:true});
    const updated=meds.find(m=>m.id===med.id);
    updateProgress(med.name,updated?.pznStatus||"unknown");
    await new Promise(r=>setTimeout(r,300)); // Pause zwischen API-Calls
  }
  // Abschluss-Status
  if(barEl())barEl().style.background="var(--green)";
  if(lblEl())lblEl().textContent="Abgeschlossen ✓";
  if(resultsEl()){
    resultsEl().innerHTML=`<div style="text-align:center;padding:12px 0;font-size:13px;font-weight:600;color:var(--green)">✅ ${okCount} OK ${conflictCount>0?`· ⚠️ ${conflictCount} Unstimmigkeit${conflictCount>1?"en":""}`:""}</div>`+resultsEl().innerHTML;
  }
  // Schließen-Button hinzufügen
  const modal=document.querySelector("#modal-ov .sheet");
  if(modal){
    const closeBtn=document.createElement("button");
    closeBtn.className="btn btn-primary btn-full";closeBtn.style.marginTop="14px";
    closeBtn.textContent="Schließen";closeBtn.onclick=()=>{closeModal();renderSettings();};
    modal.appendChild(closeBtn);
  }
  if(currentView==="list")renderList();
}

// PZN-Cache-Inhalt anzeigen
function showPZNCache(){
  const cache=getPZNCache();
  const entries=Object.entries(cache).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  let html=`<div style="font-size:15px;font-weight:700;margin-bottom:4px">💾 Gecachte PZNs</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px">${entries.length} Einträge – werden 30 Tage lokal gespeichert</div>`;
  if(!entries.length){
    html+=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Cache ist leer</div>`;
  }else{
    html+=`<div style="max-height:55vh;overflow-y:auto">`;
    entries.forEach(([pzn,data])=>{
      const med=meds.find(m=>m.pzn===pzn);
      const ageDays=Math.floor((Date.now()-(data.ts||0))/864e5);
      html+=`<div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:12px;font-family:monospace;color:var(--accent);margin-bottom:2px">PZN ${pzn}</div>
          <div style="font-weight:500;font-size:13px;margin-bottom:2px">${h(data.name||"–")}</div>
          <div style="font-size:11px;color:var(--muted)">${data.manufacturer?h(data.manufacturer)+" · ":""}${data.form?h(data.form)+" · ":""}${data.strength?h(data.strength)+" · ":""}Gecacht vor ${ageDays} Tag${ageDays!==1?"en":""}</div>
          ${med?`<div style="font-size:10px;color:var(--green);margin-top:2px">✓ In Bestand: ${h(med.name)}</div>`:`<div style="font-size:10px;color:var(--muted);margin-top:2px">Nicht mehr im Bestand</div>`}
        </div>
        <button onclick="deletePZNCacheEntry('${pzn}')" style="border:none;background:none;cursor:pointer;color:var(--muted);font-size:14px;flex-shrink:0;padding:2px">🗑️</button>
      </div>`;
    });
    html+=`</div>`;
  }
  // Kein manueller Schließen-Button nötig — X-Button oben rechts schließt das Modal
  openModal(html,"",true);
}

function exportLogCSV(){
  const log=getLog();
  const typeDE={add:"Hinzugefügt",remove:"Entnommen",edit:"Bearbeitet"};
  const hdr=["Typ","Medikament","PZN","Menge","Einheit","Bestand danach","User","Datum","Uhrzeit"];
  const rows=log.map(e=>[
    typeDE[e.type]||e.type,
    e.medName,e.pzn||"–",String(e.amount||""),e.unit||"",
    e.totalAfter!=null?String(e.totalAfter):"–",
    e.userName||"Standard",e.date,e.time
  ].map(v=>`"${String(v).replace(/"/g,"'")}"`).join(";"));
  const csv="\uFEFF"+[hdr.join(";"),...rows].join("\r\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="SaDro_Bestand_"+td()+".csv";document.body.appendChild(a);a.click();a.remove();
  toast(`✓ ${log.length} Einträge exportiert`);
}

function switchUser(id){

  toast("User gelöscht","info");updateUserIndicator();
}

// CSV-Import
function importData(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
  inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const lines=ev.target.result.split("\n").filter(l=>l.trim());const headers=lines[0].split(";").map(h=>h.replace(/"/g,"").trim());const imported=lines.slice(1).map(l=>{const vals=l.split(";").map(v=>v.replace(/^"|"$/g,""));const row={};headers.forEach((h,i)=>row[h]=vals[i]||"");return{id:genId(),name:row["Name"]||"",purpose:row["Anwendung"]||"",pzn:row["PZN"]||"",count:parseInt(row["Menge"])||1,unit:"Packung",groupId:groups[0]?.id||"",lowStock:false,storedSince:td(),expiryDate:"",photo:null};}).filter(m=>m.name);if(!imported.length){toast("Keine Daten gefunden","warn");return;}if(confirm(""+imported.length+" Medikamente importieren?")){meds=[...meds,...imported];save();renderList();toast(imported.length+" Medikamente importiert");}}catch(e){toast("Import fehlgeschlagen","warn");}};reader.readAsText(file,"utf-8");};inp.click();
}

// CSV-Export aller Medikamente

// X-Button HTML (oben rechts in jedem Modal)
function _xBtn(fn="closeModal()"){
  return `<button onclick="${fn}" style="position:absolute;top:10px;right:12px;background:var(--faint);border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:5" title="Schließen">✕</button>`;
}

function openModal(inner,cls="",closeable=false){
  let ov=document.getElementById("modal-ov");
  if(!ov){ov=document.createElement("div");ov.id="modal-ov";ov.className="overlay";document.body.appendChild(ov);}
  ov.className="overlay"+(cls?" "+cls:"");
  // X-Button immer einfügen (position:relative am Sheet nötig)
  ov.innerHTML=`<div class="sheet${cls.includes("dialog")?" dialog":""}" style="position:relative">${_xBtn()}${inner}</div>`;
  // Außenklick: nur schließen wenn closeable=true
  ov.onclick=e=>{if(e.target===ov&&closeable)closeModal();};
  ov.style.display="flex";
}

function closeModal(){const ov=document.getElementById("modal-ov");if(ov)ov.style.display="none";}
function closeAndRefresh(){closeModal();if(currentView==="list")renderList();else if(currentView==="settings")renderSettings();}

// Sub-Modal: öffnet ÜBER dem bestehenden Modal (z.B. Statistik-Detail)
// Schließen entfernt nur den Sub-Layer — Statistik bleibt sichtbar
function openSubModal(inner,cls=""){
  let sub=document.getElementById("modal-sub");
  if(sub)sub.remove();
  sub=document.createElement("div");sub.id="modal-sub";
  sub.className="overlay center-overlay";sub.style.zIndex="300";
  sub.innerHTML=`<div class="sheet dialog" style="position:relative;max-width:480px">${_xBtn("closeSubModal()")}${inner}</div>`;
  sub.onclick=e=>{if(e.target===sub)closeSubModal();};
  document.body.appendChild(sub);sub.style.display="flex";
}
function closeSubModal(){const s=document.getElementById("modal-sub");if(s)s.remove();}

// Lösch-Bestätigung Dialog
function confirmDel(id){
  const m=meds.find(x=>x.id===id);if(!m)return;
  openModal(`<div style="text-align:center;margin-bottom:12px;font-size:28px">🗑️</div><div style="font-size:15px;font-weight:700;text-align:center;margin-bottom:8px">Medikament löschen?</div><div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px;line-height:1.6">„<b style="color:var(--text)">${h(m.name)}</b>" wird dauerhaft gelöscht.</div><div style="display:flex;gap:10px"><button class="btn btn-full" onclick="closeModal()" style="flex:1">Abbrechen</button><button class="btn btn-danger btn-full" onclick="doDelete('${id}')" style="flex:1">Ja, löschen</button></div>`,"center-overlay");
}
function doDelete(id){meds=meds.filter(m=>m.id!==id);save();closeAndRefresh();toast("Gelöscht","warn");}

// GRUPPEN-DIALOG: Neue Gruppe erstellen oder bearbeiten
// ══════════════════════════════════════════════════════════════════
function openGrpModal(existing,fromStats=false){
  window._grpFromStats=fromStats;
  const defaultColor=existing?existing.color:getUniqueColor();const grp=existing||{id:null,name:"",color:defaultColor,emoji:"💊"};
  openModal(`<div style="font-size:16px;font-weight:700;margin-bottom:14px">${existing?"Gruppe bearbeiten":"Neue Gruppe"}</div>
    <div class="fw"><label class="lbl">Gruppenname</label><input id="grp-name" placeholder="z.B. Vitamine" value="${h(grp.name)}"/></div>
    <div class="fw"><label class="lbl">Farbe</label>
      <div class="color-grid" id="grp-color-grid"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
        <label style="font-size:12px;color:var(--muted);font-weight:600">Eigene:</label>
        <input type="color" id="grp-custom-color" value="${h(grp.color)}" style="width:40px;height:32px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:none" oninput="selectGrpColor(this.value)"/>
        <div id="grp-color-preview" style="width:24px;height:24px;border-radius:50%;background:${h(grp.color)};border:1px solid var(--border)"></div>
      </div>
    </div>
    <div class="fw"><label class="lbl">Emoji</label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <button id="grp-emoji-sel" style="font-size:26px;padding:4px 8px;background:var(--faint);border:1px solid var(--border);border-radius:8px;cursor:pointer;line-height:1" onclick="toggleEmojiPicker()">${h(grp.emoji)}</button>
        <span style="font-size:11px;color:var(--muted)">Klicken für Auswahl</span>
      </div>
      <div id="emoji-picker-wrap" style="display:none"></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-full" onclick="closeModal()" style="flex:1">Abbrechen</button>
      <button class="btn btn-primary btn-full" onclick="saveGrp('${grp.id||""}',window._grpFromStats||false)" style="flex:2">Speichern</button>
    </div>`,"");
  renderColorGrid(grp.color);window._grpColor=grp.color;window._grpEmoji=grp.emoji;
  // Farbauswahl-Input auf Startfarbe setzen
  setTimeout(()=>{const cv=document.getElementById('grp-custom-color');if(cv)cv.value=grp.color;},50);
}
function renderColorGrid(sel){const el=document.getElementById("grp-color-grid");if(!el)return;el.innerHTML=COLORS.map(c=>`<div class="color-dot ${c===sel?"sel":""}" style="background:${c}" onclick="selectGrpColor('${c}')"></div>`).join("");}
function selectGrpColor(c){window._grpColor=c;document.querySelectorAll(".color-dot").forEach(d=>{d.classList.toggle("sel",d.style.background===c||d.style.backgroundColor===c);});const cv=document.getElementById("grp-custom-color");if(cv)cv.value=c;const pv=document.getElementById("grp-color-preview");if(pv)pv.style.background=c;}
function toggleEmojiPicker(){const wrap=document.getElementById("emoji-picker-wrap");if(!wrap)return;const show=wrap.style.display==="none";wrap.style.display=show?"block":"none";if(show)renderEmojiPicker(wrap);}
function renderEmojiPicker(wrap){
  const quick=["💊","💉","🩺","🌡️","🩹","🏥","🧬","🩻","🌿","❤️","⭐","📦","🧴","🫙","😷","🤧","🤒","🫀","🫁","🧠","🦴","🌸","⚡","💧","🔬","🧪"];
  let html=`<div><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Schnellauswahl</div><div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px">${quick.map(e=>`<button class="emoji-btn" onclick="pickEmoji('${e}')">${e}</button>`).join("")}</div><div style="border-top:1px solid var(--border);padding-top:8px"><div id="ep-cats" style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px">`;
  Object.keys(EMOJIS).forEach((cat,i)=>{html+=`<button class="btn btn-sm ${i===0?"btn-ghost":""}" style="border-radius:20px;font-size:10px;padding:3px 8px" onclick="showEmojiCat('${h(cat)}',this)">${h(cat)}</button>`;});
  html+=`</div><div id="ep-grid" class="emoji-grid"></div></div></div>`;
  wrap.innerHTML=html;showEmojiCat(Object.keys(EMOJIS)[0]);
}
function showEmojiCat(cat,btn){document.querySelectorAll("#ep-cats button").forEach(b=>b.classList.remove("btn-ghost"));if(btn)btn.classList.add("btn-ghost");const grid=document.getElementById("ep-grid");if(!grid)return;grid.innerHTML=(EMOJIS[cat]||[]).map(e=>`<button class="emoji-btn" onclick="pickEmoji('${e}')">${e}</button>`).join("");}
function pickEmoji(e){window._grpEmoji=e;const sel=document.getElementById("grp-emoji-sel");if(sel)sel.textContent=e;const wrap=document.getElementById("emoji-picker-wrap");if(wrap)wrap.style.display="none";}
function saveGrp(existingId,fromStats=false){
  const name=document.getElementById("grp-name")?.value?.trim();if(!name){toast("Bitte Name eingeben","warn");return;}
  const color=window._grpColor||"#3B82F6";const emoji=window._grpEmoji||"💊";
  const dupColor=groups.find(g=>g.id!==existingId&&g.color===color);
  if(dupColor)toast(`ℹ️ Farbe wird auch von „${dupColor.name}" verwendet`,"info");
  if(existingId){const i=groups.findIndex(g=>g.id===existingId);if(i>=0)groups[i]={...groups[i],name,color,emoji};}
  else{groups.push({id:genId(),name,color,emoji});}
  save();
  toast(existingId?"Gruppe gespeichert":`Gruppe „${name}" erstellt`);
  if(fromStats){
    // Zurück zur Statistik – Modal bleibt offen, nur Sub-Modal schließen
    const sub=document.getElementById("modal-sub");if(sub)sub.remove();
    const statsEl=document.getElementById("stats-modal-inner");
    if(statsEl)renderStatsInto(statsEl);
  }else{
    closeAndRefresh();
  }
}

function onCountInput(v){const n=parseInt(v)||1;const row=document.getElementById("low-row");if(row)row.style.display=n<=1?"flex":"none";}

// Tab zwischen Foto und Manuell wechseln
function switchTab(t){
  const cam=document.getElementById("cam-section");const form=document.getElementById("form-section");
  const saveBtn=document.getElementById("save-btn");const pb=document.getElementById("tab-photo");const mb=document.getElementById("tab-manual");
  if(t==="photo"){
    cam.style.display="block";form.style.display="none";
    if(pb){pb.style.background="var(--accent)";pb.style.color="#fff";}
    if(mb){mb.style.background="transparent";mb.style.color="var(--muted)";}
    if(saveBtn)saveBtn.style.display="none";
  }else{
    cam.style.display="none";form.style.display="block";
    if(mb){mb.style.background="var(--accent)";mb.style.color="#fff";}
    if(pb){pb.style.background="transparent";pb.style.color="var(--muted)";}
    if(saveBtn)saveBtn.style.display="flex";
    stopCam();
  }
}

// ── KAMERA-FUNKTIONEN ──
function camSetState(streaming){
  const btn=document.getElementById("cam-btn");const stop=document.getElementById("cam-stop-btn");
  const flip=document.getElementById("cam-flip-btn");
  if(streaming){
    if(btn){btn.textContent="📸 Foto aufnehmen";btn.style.background="var(--green)";}
    if(stop)stop.style.display="";if(flip)flip.style.display="block";
  }else{
    if(btn){btn.textContent="📷 Kamera starten";btn.style.background="var(--accent)";}
    if(stop)stop.style.display="none";if(flip)flip.style.display="none";
  }
}

// Kamera zwischen Vorder- und Rückkamera wechseln
async function flipCamera(){
  _camFacing=_camFacing==="environment"?"user":"environment";
  stopCam();await new Promise(r=>setTimeout(r,300));camStartOrPhoto();
}

// Kamera starten oder (wenn läuft) Foto aufnehmen
function camStartOrPhoto(){
  if(_camStream&&_camStream.active){takePhoto();return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:_camFacing},width:{ideal:1280}}}).then(stream=>{
    _camStream=stream;const video=document.getElementById("cam-video");
    if(video){video.srcObject=stream;video.style.display="block";video.play();}
    const ph=document.getElementById("cam-placeholder");if(ph)ph.style.display="none";
    const err=document.getElementById("cam-err");if(err)err.style.display="none";
    camSetState(true);
  }).catch(()=>{
    const err=document.getElementById("cam-err");
    if(err){err.textContent="Kamera-Zugriff verweigert. In Chrome: Adressleiste → ⚠️ → Kamera → Erlauben";err.style.display="block";}
    camSetState(false);_camStream=null;
  });
}
function camStop(){stopCam();camSetState(false);}

// Foto aufnehmen, automatisch zuschneiden und als Vorschau hinzufügen
async function takePhoto(){
  const video=document.getElementById("cam-video");if(!video||!_camStream)return;
  const canvas=document.createElement("canvas");canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext("2d").drawImage(video,0,0);
  const raw=canvas.toDataURL("image/jpeg",.88);
  const result=await autoCropPhoto(raw);
  toast("📸 Foto aufgenommen","info");
  const compressed=await new Promise(res=>{
    const img=new Image();img.onload=()=>{
      const s=Math.min(1,800/img.width);const c=document.createElement("canvas");
      c.width=img.width*s;c.height=img.height*s;c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",.78));
    };img.src=result.url;
  });
  _camPhotos.push(compressed);
  updateThumbs();document.getElementById("analyse-btn").style.display="block";
}

// Foto-Vorschau-Streifen aktualisieren
function updateThumbs(){
  const row=document.getElementById("thumb-row");if(!row)return;

// KI-ANALYSE: Fotos auswerten und Formular automatisch befüllen
// Ablaufdatum wird auf Ende des Monats gesetzt
// Stückzahl pro Packung wird erkannt und eingetragen
// ══════════════════════════════════════════════════════════════════
async function analysePhotos(){
  if(!_camPhotos.length)return;
  stopCam();const btn=document.getElementById("analyse-btn");
  if(btn)btn.innerHTML=`<span class="spin">⟳</span> KI analysiert...`;
  try{
    const grpNames=groups.map(g=>g.name).join(", ");
    const imgParts=_camPhotos.map(p=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:p.split(",")[1]}}));
    const raw=await callAI([{role:"user",content:[...imgParts,{type:"text",text:`Du bist ein präziser OCR-Spezialist für deutsche Medikamentenverpackungen. Lese JEDEN sichtbaren Text auf dem Foto.

PFLICHT-FELDER (immer ausfüllen wenn sichtbar):
1. PZN: Suche "PZN" + 7-8 Ziffern ODER Barcode-Nummer. Führende Nullen BEIBEHALTEN (z.B. "02817656")
2. NAME: Exakt wie aufgedruckt (z.B. "MirtaLich 15 mg Filmtabletten")
3. STÄRKE: z.B. "15 mg", "400 mg", "10 mg/ml" – als eigenes Feld strength
4. MENGE:
   - Einzelne Zahl + Einheit: "50 Tabletten" → totalPills:50, pillType:"Tablette"
   - Blister: "5 Blister zu 10" → blisterCount:5, pillsPerBlister:10, totalPills:50
   - Wenn unklar: totalPills als beste Schätzung eintragen
5. HERSTELLER: Firmenname (z.B. "1 A Pharma", "Heumann", "Ratiopharm")
6. MHD: Format MM/JJJJ oder EXP MM/YY → als "JJJJ-MM" ausgeben
7. GRUPPE aus dieser Liste: ${grpNames}

BILD-QUALITÄT: Foto kann schräg, unscharf oder teilweise verdeckt sein – trotzdem versuchen zu lesen!

ANTWORT NUR als JSON (kein Text davor/danach):
{"known":true,"name":"Produktname","strength":"15 mg","manufacturer":"Hersteller","purpose":"Anwendungsgebiet max 60 Zeichen","pzn":"02817656","expiryYearMonth":"2027-06","groupName":"Gruppe","count":1,"unit":"Packung","pillType":"Tablette","blisterCount":null,"pillsPerBlister":null,"totalPills":50}
Wenn Bild komplett unlesbar (nur Hand/Finger sichtbar, kein Text): {"known":false}`}]}],1000);
    const p=parseJ(raw);
    if(p.known){
      let gid=groups.find(x=>x.name===p.groupName)?.id||"";
      if(!gid&&p.groupName){const ng=await autoGroup(p.groupName);if(ng)gid=ng.id;}
      // Stückzahl berechnen
      const totalP=p.blisterCount&&p.pillsPerBlister?p.blisterCount*p.pillsPerBlister:(p.totalPills||null);
      const pillTypeStr=p.pillType||"Tablette";
      // Ablaufdatum auf Ende des Monats setzen (z.B. 2026-06 → 2026-06-30)
      const expiryDate=p.expiryYearMonth?toEndOfMonth(p.expiryYearMonth+"-01"):"";
      // Info-Zeile über erkannte Menge
      const info=totalP?`${totalP} ${pillTypeStr} erkannt`:(p.blisterCount?`${p.blisterCount} Blister`:"");
      window._blisterCount=p.blisterCount||null;window._pillsPerBlister=p.pillsPerBlister||null;
      window._totalPills=totalP;window._pillType=pillTypeStr;
      switchTab("manual");
      setTimeout(()=>{
        setVal("med-name",p.name||"");
        if(p.strength)setVal("med-strength",p.strength);
        if(p.manufacturer)setVal("med-maker",p.manufacturer);;setVal("med-purpose",p.purpose||"");
        setVal("med-pzn",(p.pzn&&p.pzn!=="null")?p.pzn:"");
        setVal("med-count",p.count||1);setVal("med-exp",expiryDate);
        // Stückzahl pro Blister NUR bei echter Blister-Struktur (blisterCount>1)
        // Gesamt-Stückzahl immer eintragen (sichtbar und editierbar)
        if(totalP)setVal("med-total-pills",totalP);
        // Blister-Felder nur wenn echte Struktur bekannt
        if(p.blisterCount&&p.blisterCount>1){setVal("med-blister-count",p.blisterCount);if(p.pillsPerBlister)setVal("med-pills",p.pillsPerBlister);}
        // Stück-Einheit entsprechend der erkannten Form setzen
        const pillSel=document.getElementById("med-pill-unit");
        if(pillSel&&pillTypeStr){const opts=Array.from(pillSel.options);const match=opts.find(o=>pillTypeStr.toLowerCase().includes(o.value.toLowerCase()));if(match)pillSel.value=match.value;}
        const grpSel=document.getElementById("med-grp");if(grpSel&&gid)grpSel.value=gid;
        const pi=document.getElementById("pkg-info");if(pi&&info){pi.textContent="📦 KI erkannte: "+info+(expiryDate?" · MHD bis "+fmtDate(expiryDate):"");pi.style.display="block";}
        window._addPhotos=[..._camPhotos];window._addPhoto=_camPhotos[0]||null;
        document.getElementById("analyse-ok").style.display="block";
        toast(`✨ ${p.name||"Medikament"} erkannt`,"info");
      },100);
    }else{switchTab("manual");toast("Nicht erkannt – bitte manuell eingeben","warn");}
  }catch(e){
    if(e.message&&(e.message.includes("credit")||e.message.includes("balance"))){toast("💳 API-Guthaben aufgebraucht","warn");}
    else{handleAIErr(e);}
    if(btn)btn.innerHTML="✨ KI analysieren";
  }
}
function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v;}

// Rechtschreibprüfung für Medikamenten-Namen
let spellTimer=null;
function onNameInput(val){
  clearTimeout(spellTimer);
  document.getElementById("spell-box").style.display="none";document.getElementById("spell-ind").textContent="";
  if(val.length<2)return;
  document.getElementById("spell-ind").textContent="✦ prüft...";
  spellTimer=setTimeout(async()=>{
    try{
      const grpNames=groups.map(g=>g.name).join(", ");
      const raw=await callAI([{role:"user",content:`Medikament: "${val}". Gruppen: ${grpNames}.
WICHTIG: Nur ECHTE Tippfehler korrigieren (z.B. 'Ibuprofon'→'Ibuprofen').
Abkürzungen/Teilnamen (z.B. 'desmo','ibu','asp') sind GÜLTIG → corrected muss null sein.
NIEMALS einen Satz als corrected ausgeben – corrected muss null oder ein Medikamentenname sein.
NUR JSON: {"isMed":true,"correct":true,"corrected":null,"purpose":"Anwendung max 50 Zeichen","groupName":"Korrekte Gruppe","pillUnit":"Tablette oder Kapsel oder Ampulle etc."}`}],200);
      const p=parseJ(raw);
      document.getElementById("spell-ind").textContent="";
      const purpEl=document.getElementById("med-purpose");if(purpEl&&p.purpose&&!purpEl.value)purpEl.value=p.purpose;
      let gid=groups.find(x=>x.name===p.groupName)?.id||"";
      if(!gid&&p.groupName&&p.isMed){document.getElementById("grp-ind").textContent="– KI wählt...";const ng=await autoGroup(p.groupName);if(ng)gid=ng.id;document.getElementById("grp-ind").textContent="– automatisch";}
      if(gid){const s=document.getElementById("med-grp");if(s)s.value=gid;}
      // Nur anzeigen wenn: corrected vorhanden, kein Satz (max 4 Wörter), nicht identisch
      const isValidCorr=p.corrected&&p.corrected.toLowerCase()!==val.toLowerCase()&&p.corrected.split(" ").length<=4&&p.corrected.length<60;
      if(isValidCorr){
        const box=document.getElementById("spell-box");box.style.display="block";
        box.innerHTML=`<div class="alert alert-amber">💡 <div style="flex:1"><b style="color:var(--amber)">Meintest du: „${h(p.corrected)}"?</b><div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-green btn-sm" onclick="document.getElementById('med-name').value='${h(p.corrected)}';document.getElementById('spell-box').style.display='none';onNameInput('${h(p.corrected)}')">✓ Übernehmen</button><button class="btn btn-sm" onclick="document.getElementById('spell-box').style.display='none'">Behalten</button></div></div></div>`;
      }
    }catch(e){document.getElementById("spell-ind").textContent="";}
  },200);
}

// MEDIKAMENT SPEICHERN: Neues Medikament anlegen oder bearbeiten
// Nach dem Speichern ohne Foto: KI sucht Bild aus dem Internet

function saveMed(){
  const name=document.getElementById("med-name")?.value?.trim();
  if(!name){toast("Bitte Name eingeben","warn");return;}
  const expiryVal=document.getElementById("med-exp")?.value;
  if(!expiryVal){toast("⚠ Bitte Haltbarkeitsdatum (MHD) eintragen","warn");document.getElementById("med-exp")?.focus();return;}
  const strength=document.getElementById("med-strength")?.value?.trim()||"";
  const manufacturer=document.getElementById("med-maker")?.value?.trim()||"";
  const count=parseInt(document.getElementById("med-count")?.value)||1;
  const unit=document.getElementById("med-unit")?.value||"Packung";
  const lowStock=count<=1&&(document.getElementById("med-low")?.checked||false);
  const grpId=document.getElementById("med-grp")?.value||groups[groups.length-1]?.id;
  const existing=meds.find(x=>x.id===_medId);
  const pillsManual=parseInt(document.getElementById("med-pills")?.value)||0;
  const totalPillsManual=parseInt(document.getElementById("med-total-pills")?.value)||0;
  const blisterCountManual=parseInt(document.getElementById("med-blister-count")?.value)||0;
  const pillUnit=document.getElementById("med-pill-unit")?.value||"Tablette";
  const pillsPerPack=pillsManual||window._pillsPerBlister||existing?.pillsPerBlister||null;
  const blisterCount=blisterCountManual||window._blisterCount||existing?.blisterCount||null;
  // Gesamt: zuerst manuell eingetragen, dann berechnet, dann aus AI-Scan
  const computedFromBlister=pillsPerPack&&blisterCount?pillsPerPack*blisterCount:null;
  const computedFromPack=pillsPerPack&&count?count*pillsPerPack:null;
  const finalTotal=totalPillsManual||computedFromBlister||computedFromPack||(window._totalPills||existing?.totalPills||null);
  const countChanged=existing&&existing.count!==count;
  const rawPhotos=(window._addPhotos&&window._addPhotos.length?window._addPhotos:(_camPhotos.length?[..._camPhotos]:(existing?.photos)||[]));
  const rawPhoto=(window._addPhotos&&window._addPhotos[0])||(_camPhotos.length?_camPhotos[0]:null)||(existing?.photos&&existing.photos[0])||(existing?.photo)||null;
  const m={
    id:_medId||genId(),name,strength,manufacturer,
    purpose:document.getElementById("med-purpose")?.value||"",
    pzn:(()=>{const v=document.getElementById("med-pzn")?.value||"";return(v==="null"||v==="undefined")?"":v;})(),
    count,unit,lowStock,groupId:grpId,
    storedSince:document.getElementById("med-since")?.value||td(),
    expiryDate:document.getElementById("med-exp")?.value||"",
    photos:rawPhotos,photo:rawPhoto,
    blisterCount:blisterCount,
    pillsPerBlister:pillsPerPack,pillUnit,totalPills:finalTotal,
  };
  // Foto beim Speichern zuschneiden (async, dann fortfahren)
  _doSaveMed(m,rawPhoto);
}

// Interner Speicher-Ablauf nach optionalem Crop
async function _doSaveMed(m,rawPhoto){
  // Kein Crop beim Speichern – Originalbild wird gespeichert
  if(rawPhoto){m={...m,photoCropped:true};}
  if(_medId){
    meds=meds.map(x=>x.id===_medId?m:x);addToArchive(m);
    // pillsPerBlister nur in Cache schreiben wenn blisterCount>1 (echte Blister-Struktur bekannt)
    if(m.pillsPerBlister&&m.pillsPerBlister>0&&m.blisterCount&&m.blisterCount>1)setBlisterPPB(m.id,m.pillsPerBlister);
    window._addPhoto=null;window._addPhotos=null;window._blisterCount=null;window._pillsPerBlister=null;window._totalPills=null;window._pillType=null;
    save();closeAndRefresh();stopCam();toast("Gespeichert ✓");
    if(apiKey&&apiKey.startsWith("sk-ant-"))setTimeout(()=>checkMed(m.id,{silent:true,fetchImage:!m.photo}),1500);
  }else{
    const _nn=s=>(s||"").toLowerCase().replace(/[^a-z0-9äöüß]/g,"");
    const dup=meds.find(x=>{
      if(m.pzn&&x.pzn&&m.pzn.replace(/^0+/,"")===x.pzn.replace(/^0+/,""))return true;
      const na=_nn(m.name),nb=_nn(x.name);
      if(na===nb)return true;
      if(na.length>=6&&nb.length>=6&&na.slice(0,8)===nb.slice(0,8))return true;
      return false;
    });
    if(dup){
      _pendingMed=m;
      openModal(`<div style="font-size:16px;font-weight:700;margin-bottom:12px">🔄 Bereits vorhanden</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6"><b style="color:var(--text)">${h(dup.name)}</b> ist bereits mit <b>${dup.count} ${dup.unit}</b> eingetragen.</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-primary btn-full" onclick="mergeDup('${dup.id}')">➕ Zusammenführen (${dup.count} + ${m.count} ${m.unit})</button>
          <button class="btn btn-full" style="background:var(--amberlo);color:var(--amber)" onclick="updateDup('${dup.id}')">📝 MHD / Foto aktualisieren</button>
          <button class="btn btn-full" onclick="addAnyway()">➕ Als neuen Eintrag anlegen</button>
          <button class="btn btn-full" onclick="closeModal()">Abbrechen</button>
        </div>`,"center-overlay");
      return;
    }
    meds.push(m);addToArchive(m);
    addLogEntry("add",m,m.count,m.unit); // Bestandsführungs-Log
    // pillsPerBlister nur in Cache wenn blisterCount>1 bekannt (z.B. "2 Blister à 10 Tabletten")
    if(m.pillsPerBlister&&m.pillsPerBlister>0&&m.blisterCount&&m.blisterCount>1)setBlisterPPB(m.id,m.pillsPerBlister);
    window._addPhoto=null;window._addPhotos=null;window._blisterCount=null;window._pillsPerBlister=null;window._totalPills=null;window._pillType=null;
    save();closeAndRefresh();stopCam();toast(`${name} hinzugefügt ✓`);
    // 1 API-Call: PZN + alle Felder + Bild
    if(apiKey&&apiKey.startsWith("sk-ant-"))setTimeout(()=>checkMed(m.id,{silent:true,fetchImage:true}),1500);
  }
}

// Duplikate zusammenführen: Bestände addieren
let _pendingMed=null;
function mergeDup(dupId){
  if(!_pendingMed)return;
  meds=meds.map(m=>{
    if(m.id!==dupId)return m;
    const dates=[m.expiryDate,_pendingMed.expiryDate].filter(Boolean);
    const earliestExpiry=dates.length?dates.sort()[0]:m.expiryDate; // Frühestes MHD behalten
    const ep=m.photos&&m.photos.length?m.photos:(m.photo?[m.photo]:[]);
    const np=_pendingMed.photos&&_pendingMed.photos.length?_pendingMed.photos:(_pendingMed.photo?[_pendingMed.photo]:[]);
    const allPhotos=[...np,...ep.filter(p=>!np.includes(p))].slice(0,6);
    const t1=m.totalPills||(m.pillsPerBlister&&m.count?m.count*m.pillsPerBlister:0);
    const t2=_pendingMed.totalPills||(_pendingMed.pillsPerBlister&&_pendingMed.count?_pendingMed.count*_pendingMed.pillsPerBlister:0);
    return{...m,count:m.count+_pendingMed.count,expiryDate:earliestExpiry,photos:allPhotos,photo:allPhotos[0]||m.photo,
      blisterCount:_pendingMed.blisterCount||m.blisterCount,pillsPerBlister:_pendingMed.pillsPerBlister||m.pillsPerBlister,
      totalPills:(t1+t2)||null};
  });
  _pendingMed=null;save();closeAndRefresh();stopCam();toast("Bestände zusammengeführt ✓");
}

// Duplikat: Nur MHD und Foto aktualisieren, Bestand bleibt
function updateDup(dupId){
  if(!_pendingMed)return;
  meds=meds.map(m=>{
    if(m.id!==dupId)return m;
    const dates=[m.expiryDate,_pendingMed.expiryDate].filter(Boolean);const earliest=dates.length?dates.sort()[0]:m.expiryDate;
    const ep=m.photos&&m.photos.length?m.photos:(m.photo?[m.photo]:[]);
    const np=_pendingMed.photos&&_pendingMed.photos.length?_pendingMed.photos:(_pendingMed.photo?[_pendingMed.photo]:[]);
    return{...m,expiryDate:earliest,photos:[...ep,...np.filter(p=>!ep.includes(p))],photo:ep[0]||m.photo,
      blisterCount:_pendingMed.blisterCount||m.blisterCount,pillsPerBlister:_pendingMed.pillsPerBlister||m.pillsPerBlister};
  });
  _pendingMed=null;save();closeAndRefresh();stopCam();toast("Aktualisiert ✓");
}

// Trotzdem als neuen Eintrag anlegen
function addAnyway(){
  if(_pendingMed){meds.push(_pendingMed);_pendingMed=null;save();closeAndRefresh();stopCam();toast("Neu angelegt");}
  closeModal();
}

// Dynamische Entnahme-Einheiten aus dem Medikament ableiten
function getEntUnitsFor(med){
  if(!med)return ENT_UNITS;
  const result=[];
  // 1. Stückeinheit zuerst (höchste Priorität)
  if(med.pillUnit&&!result.includes(med.pillUnit))result.push(med.pillUnit);
  // 2. Blister NUR wenn echte Blister-Struktur:
  //    - med.unit=Blister (Grundeinheit ist Blister), ODER
  //    - blisterCount>1 (mehrere Blister pro Packung), ODER
  //    - Cache hat Eintrag (Nutzer hat Blistergröße eingetragen)
  const hasBlisterStructure=(med.unit==="Blister")||(med.blisterCount&&med.blisterCount>1)||!!getBlisterPPB(med);
  if(hasBlisterStructure&&!result.includes("Blister"))result.push("Blister");
  // 3. Packungseinheit
  if(med.unit&&!result.includes(med.unit))result.push(med.unit);
  // 4. Kompatible Alternativen aus ENT_UNITS
  const medGrp=getUnitGroup(med.pillUnit||"");
  ENT_UNITS.forEach(u=>{
    if(!result.includes(u)){
      const uGrp=getUnitGroup(u);
      // Nur gleiche Gruppe oder Blister↔Oral
      if(!uGrp||!medGrp||uGrp===medGrp||(uGrp==="oral"&&medGrp==="oral"))result.push(u);
    }
  });
  // Mindestens die Packungseinheit immer verfügbar
  if(!result.includes("Packung"))result.push("Packung");
  return result;
}

function addEntRow(){_entRows.push({qty:1,unit:_entMed?.pillUnit||"Tablette"});renderEntModal();}
function removeEntRow(i){_entRows=_entRows.filter((_,j)=>j!==i);renderEntModal();}

// Vorschau: Verbleibenden Bestand nach Entnahme berechnen
function updateEntPreview(){
  if(!_entMed)return;
  const ppbCached=getBlisterPPB(_entMed);
  // ppp = Tabletten pro PACKUNG. ppbCached = Tabletten pro BLISTER. Nie verwechseln!
  const ppp=_entMed.totalPills&&_entMed.count>0?Math.round(_entMed.totalPills/_entMed.count):null;
  const el=document.getElementById("ent-remain");if(!el)return;
  // Blister-Zeile ohne bekannte Menge → Warnung, keine Berechnung
  const hasBlister=_entRows.some(r=>r.unit.toLowerCase()==="blister");
  if(hasBlister&&!ppbCached){
    el.textContent="⚠️ Blistermenge eintragen – Buchen gesperrt";
    el.style.color="var(--amber)";return;
  }
  let packDelta=0,pillDelta=0;
  _entRows.forEach(r=>{
    const u=r.unit.toLowerCase();const mu=_entMed.unit.toLowerCase();
    if(u===mu){packDelta+=r.qty;}
    else if(u==="blister"){
      // Sanity-Check: pib darf nicht > totalPills des Medikaments sein
      const rawPib=ppbCached||1;
      const ppp2=_entMed.totalPills&&_entMed.count>0?Math.round(_entMed.totalPills/_entMed.count):0;
      // Nur korrigieren wenn pib größer als eine ganze Packung (nicht nur Gesamtbestand)
      const pib=ppp2>0&&rawPib>ppp2*1.1?1:rawPib;
      pillDelta+=r.qty*pib;
      if(ppp&&ppp>1)packDelta+=r.qty*pib/ppp;else packDelta+=r.qty;
    }else if(["tablette","kapsel","tropfen","ml","ampulle"].includes(u)){
      pillDelta+=r.qty;
      if(ppp&&ppp>1)packDelta+=r.qty/ppp;
    }else{packDelta+=r.qty;}
  });
  const newPills=_entMed.totalPills!=null?Math.max(0,_entMed.totalPills-pillDelta):null;
  const newPacks=newPills!=null&&ppp&&ppp>1?Math.max(0,Math.ceil(newPills/ppp)):Math.max(0,Math.round(_entMed.count-packDelta));
  el.textContent=(newPills!=null?newPills+" "+(_entMed.pillUnit||"Tablette")+" ("+newPacks+" "+_entMed.unit+")":newPacks+" "+_entMed.unit)+(newPacks===0?" – Nachkaufen!":"");
  el.style.color=newPacks===0?"var(--red)":"var(--text)";
}

// Kamera-Aktionen für Entnahme-Scan
let _entCamStream=null;
function entCamAction(){
  const video=document.getElementById("ent-cam-video");const btn=document.getElementById("ent-cam-btn");
  if(_entCamStream){
    // Kamera läuft → Foto aufnehmen und analysieren
    const canvas=document.createElement("canvas");canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);
    stopEntCam();analyseEntPhoto(canvas.toDataURL("image/jpeg",.85));return;
  }
  // Kamera noch nicht gestartet → starten
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280}}}).then(stream=>{
    _entCamStream=stream;if(video){video.srcObject=stream;video.style.display="block";video.play();}
    const ph=document.getElementById("ent-cam-ph");if(ph)ph.style.display="none";
    const err=document.getElementById("ent-cam-err");if(err)err.style.display="none";
    if(btn){btn.textContent="📸 Foto aufnehmen";btn.style.background="var(--green)";}
  }).catch(()=>{
    const err=document.getElementById("ent-cam-err");
    if(err){err.style.display="block";err.style.background="var(--redlo)";err.style.color="var(--red)";err.textContent="Kamera nicht verfügbar";}
    if(btn){btn.textContent="📷 Kamera starten";btn.style.background="var(--accent)";}
  });
}
function stopEntCam(){if(_entCamStream){_entCamStream.getTracks().forEach(t=>t.stop());_entCamStream=null;}const v=document.getElementById("ent-cam-video");if(v)v.style.display="none";}

// Foto analysieren und passendes Medikament im Bestand finden
async function analyseEntPhoto(raw){
  const st=document.getElementById("ent-ai-status");if(st)st.style.display="block";
  const photo=await new Promise(res=>{const img=new Image();img.onload=()=>{const s=Math.min(1,600/img.width);const c=document.createElement("canvas");c.width=img.width*s;c.height=img.height*s;c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",.7));};img.src=raw;});
  try{
    const medNames=meds.map(m=>m.name).join(", ");
    const r=await callAI([{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:photo.split(",")[1]}},
      {type:"text",text:`Erkenne das Medikament (beliebige Ausrichtung). Vorhandene Medikamente: ${medNames}. NUR JSON: {"name":"Name","found":true}. Falls unklar: {"found":false}`}
    ]}],100);
    const p=JSON.parse(r.match(/\{[\s\S]*\}/)[0]);
    if(st)st.style.display="none";
    if(p.found){
      const found=meds.find(m=>m.name.toLowerCase()===p.name.toLowerCase()||m.name.toLowerCase().includes(p.name.toLowerCase().split(" ")[0]));
      if(found){selectEntMed(found.id);entSwitchTab("search");toast(`✓ ${found.name} erkannt`,"info");}
      else{toast(`${p.name} – nicht im Bestand`,"warn");entSwitchTab("search");}
    }else{toast("Nicht erkannt – bitte manuell suchen","warn");entSwitchTab("search");}
  }catch(e){if(st)st.style.display="none";handleAIErr(e);entSwitchTab("search");}
}

// Warnung wenn Entnahme-Einheit nicht zum Medikament passt
// Inkompatibilitäts-Gruppen: Einheiten die NICHT zusammenpassen
const UNIT_GROUPS={
  oral:["tablette","kapsel","dragee","blister","lutschpastille"],
  fluessig:["ml","tropfen","spray","lösung","suspension","flasche","saft"],
  injizierbar:["ampulle","injektionslösung"],
  topisch:["salbe","creme","gel","pflaster","tube"],
  inhalativ:["inhalation","pulver"],
  pakung:["packung"]
};
function getUnitGroup(u){
  const ul=u.toLowerCase();
  for(const[grp,units]of Object.entries(UNIT_GROUPS)){if(units.some(x=>ul.includes(x)))return grp;}
  return null;
}

function checkEntUnit(rowIdx){
  if(!_entMed)return;const row=_entRows[rowIdx];if(!row)return;
  const u=row.unit.toLowerCase();
  const pu=(_entMed.pillUnit||"tablette").toLowerCase();
  const uGrp=getUnitGroup(u);const puGrp=getUnitGroup(pu);
  // Kompatibel wenn: gleiche Gruppe, oder Blister↔Tablette/Kapsel, oder unbekannte Gruppe
  const blisterOk=(u==="blister"&&["tablette","kapsel","dragee"].some(x=>pu.includes(x)))||
                  (pu==="blister"&&["tablette","kapsel","dragee"].some(x=>u.includes(x)));
  const incompat=uGrp&&puGrp&&uGrp!==puGrp&&uGrp!=="pakung"&&puGrp!=="pakung"&&!blisterOk;
  const el=document.getElementById("ent-unit-warn-"+rowIdx);
  const bookBtn=document.getElementById("ent-book-btn");
  if(incompat){
    if(el){el.style.display="block";el.style.color="var(--red)";el.textContent=`🚫 ${_entMed.name} enthält ${_entMed.pillUnit||"Tabletten"} – „${row.unit}" ist inkompatibel!`;}
    if(bookBtn){bookBtn.disabled=true;bookBtn.style.opacity=".4";}
    toast(`🚫 ${_entMed.pillUnit||"Tablette"} ≠ ${row.unit} – Einheit ändern!`,"warn");
  }else{
    if(el){el.style.display="none";}
    if(u==="blister"){
      const ppbConfirmed=getCachedBlisterPPB(_entMed); // Nur user-bestätigter Wert
      const ppbSuggested=getBlisterPPB(_entMed);       // Auch AI-Wert (für Anzeige)
      const pillsPerPack2=_entMed.totalPills&&_entMed.count>0?Math.round(_entMed.totalPills/_entMed.count):0;
      const ppbUnrealistic=ppbSuggested&&pillsPerPack2>0&&ppbSuggested>=pillsPerPack2;
      if(ppbConfirmed&&ppbConfirmed>0&&!ppbUnrealistic){
        // User hat Blistermenge bereits bestätigt → anzeigen
        if(el){el.style.display="block";el.style.color="var(--accent)";el.textContent=`ℹ️ 1 Blister = ${ppbConfirmed} ${_entMed.pillUnit||"Tabletten"}`;}
        if(bookBtn){bookBtn.disabled=false;bookBtn.style.opacity="1";}
      }else{
        // Noch nicht vom User bestätigt → Dialog erzwingen
        const hint=ppbUnrealistic?`⚠️ Blistermenge (${ppbSuggested}) unrealistisch – bitte korrigieren`:`⚠️ Blistermenge noch nicht bestätigt – bitte eintragen`;
        if(el){el.style.display="block";el.style.color="var(--amber)";el.textContent=hint;}
        if(bookBtn){bookBtn.disabled=true;bookBtn.style.opacity=".4";}
        setTimeout(()=>openBlisterAmountDialog(rowIdx),200);
      }
    }else{
      if(bookBtn){bookBtn.disabled=false;bookBtn.style.opacity="1";}
    }
  }
}

// ENTNAHME BUCHEN: Bestand korrekt reduzieren
// Einzelne Tabletten/Ampullen werden korrekt gezählt
// ══════════════════════════════════════════════════════════════════
function bookEntnahme(){
  if(!_entMed)return;
  const med=meds.find(m=>m.id===_entMed.id);if(!med)return;
  // Guard: Blister ohne Menge ODER unrealistische Menge (> Gesamtbestand) → Dialog
  const blisterRowIdx=_entRows.findIndex(r=>r.unit.toLowerCase()==="blister");
  if(blisterRowIdx>=0){
    const pibChk=getCachedBlisterPPB(med); // Nur user-bestätigt – AI-Wert zählt nicht
    // Ungültig nur wenn pib > Tabletten pro PACKUNG (nicht pro Gesamtbestand)
    // Letzter Blister entnehmen darf 0 ergeben – das ist korrekt!
    const pillsPerPack=med.totalPills&&med.count>0?Math.round(med.totalPills/med.count):0;
    const pibFull=getBlisterPPB(med); // Für Plausibilitätsprüfung inkl. AI-Wert
    // Bad: pib >= pillsPerPack bedeutet 1 Blister = ganze Packung → verdächtig → Dialog
    const pibBad=pibFull&&pillsPerPack>0&&pibFull>=pillsPerPack;
    if(!pibChk||pibBad){
      if(pibBad){
        meds=meds.map(m=>m.id===med.id?{...m,pillsPerBlister:null}:m);
        const bc=getBlisterCache();delete bc[med.id];LS.set('sdro_blister_cache',bc);
        save();
      }
      openBlisterAmountDialog(blisterRowIdx);return;
    }
  }
  const summary=_entRows.map(r=>r.qty+" "+r.unit).join(" + ");
  // Stückzahl pro Packung ermitteln
  // ppp = Stück pro Zähleinheit (z.B. 30 Tabletten pro Packung, nicht pro Blister)
  // ppp = Tabletten pro PACKUNG, niemals pillsPerBlister (=Tabletten pro Blister, anderes Konzept!)
  const ppp=med.totalPills&&med.count>0?Math.round(med.totalPills/med.count):null;
  let packDelta=0,pillDelta=0;
  _entRows.forEach(r=>{
    const u=r.unit.toLowerCase();const mu=med.unit.toLowerCase();
    const isSmall=["tablette","kapsel","tropfen","ml","ampulle"].includes(u);
    const isBlisterUnit=(u==="blister");
    const medIsBlister=(mu==="blister");
    if(isBlisterUnit){
      // Blister-Entnahme: immer über Blister-Cache rechnen – NIE ppp (Gesamt)
      const pib=getBlisterPPB(med)||(medIsBlister&&ppp?ppp:1);
      pillDelta+=r.qty*pib;
      if(medIsBlister){packDelta+=r.qty;} // Einheit ist Blister → 1:1
      else if(ppp&&ppp>0)packDelta+=r.qty*pib/ppp; // anteilig von Packung
    }else if(isSmall){
      // Einzelne Tablette/Kapsel → nur Stückzahl reduzieren
      pillDelta+=r.qty;
      if(ppp&&ppp>1)packDelta+=r.qty/ppp;
    }else if(u===mu){
      // Gleiche Verpackungseinheit wie Bestand (Packung, Spray, Flasche …)
      packDelta+=r.qty;
      if(ppp&&!medIsBlister)pillDelta+=r.qty*ppp;
    }else{
      // Andere Verpackungseinheit → Packungen direkt abziehen
      packDelta+=r.qty;
    }
  });
  // Neuen Bestand berechnen
  const newTotalPills=med.totalPills!=null?Math.max(0,med.totalPills-pillDelta):null;
  let newCount;
  if(newTotalPills!=null&&ppp&&ppp>1){
    // Packungen aus Stückzahl ableiten
    newCount=Math.max(0,Math.ceil(newTotalPills/ppp));
  }else{
    newCount=Math.max(0,Math.round(med.count-packDelta));
  }
  meds=meds.map(m=>m.id===med.id?{...m,count:newCount,totalPills:newTotalPills,lowStock:newTotalPills!=null?(newTotalPills<=5&&newCount<=1):(newCount===1&&newCount>0)}:m);
  // Bestandsführungs-Log: Entnahme-Zusammenfassung
  const logSummary=_entRows.map(r=>r.qty+" "+r.unit).join(", ");
  addLogEntry("remove",{...med,count:newCount,totalPills:newTotalPills},logSummary,null);
  save();
  // Wenn Bestand auf 0: Nachfragen ob löschen oder behalten
  if(newCount===0&&(newTotalPills===null||newTotalPills===0)){
    closeModal();renderList();
    const medName=med.name;const medId=med.id;
    const isFavorit=isFav(medId);
    if(isFavorit){
      // Favoriten: automatisch behalten mit "LEER"-Hinweis, nur kurz informieren
      toast(`⭐ ${medName} ist aufgebraucht – bleibt als Favorit mit „LEER"-Status`,"warn");
    }else{
      // Nicht-Favoriten: Dialog fragen
      openModal(`<div style="text-align:center;margin-bottom:14px">
        <div style="font-size:36px;margin-bottom:8px">📭</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">${h(medName)} aufgebraucht</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px">Bestand ist jetzt 0. Was möchtest du tun?</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-danger btn-full" onclick="removeMedAfterEmpty('${medId}')">🗑️ Aus Liste entfernen</button>
          <button class="btn btn-full" style="background:var(--card2);color:var(--text);border:1px solid var(--border)" onclick="closeModal();renderList()">📋 Behalten (Bestand = 0)</button>
        </div>
      </div>`,"center-overlay",true);
    }
  }else{
    closeModal();renderList();
    const rem=newTotalPills!=null?" (noch "+newTotalPills+" "+(med.pillUnit||"Tablette")+")":"";
    toast(med.name+": "+summary+" entnommen → "+newCount+" "+med.unit+rem,"ok");
  }
}

async function processPZNPaste(){
  const text=document.getElementById("pzn-paste-area")?.value||"";
  const statusEl=document.getElementById("pzn-import-status");
  if(!text.trim()){toast("Bitte erst Text einfügen","warn");return;}
  if(statusEl){statusEl.style.display="block";statusEl.style.background="var(--acclo)";statusEl.style.color="var(--accent)";statusEl.textContent="Verarbeite...";}
  const lines=text.split("\n");
  const records=[];
  for(let i=0;i<lines.length;i++){
    const parts=lines[i].split(";");
    if(parts.length>=4&&parts[0].trim().match(/^\d{5,8}$/)){
      records.push({pzn:parts[0].trim().padStart(8,"0"),name:parts[3]?.trim()||"",form:parts[4]?.trim()||"",unit:parts[1]?.trim()||""});
    }
  }
  if(!records.length){
    if(statusEl){statusEl.style.background="var(--redlo)";statusEl.style.color="var(--red)";statusEl.textContent="⚠ Keine gültigen PZN-Daten gefunden. Bitte prüfe das Format.";}
    return;
  }
  if(statusEl)statusEl.textContent=`Speichere ${records.length.toLocaleString("de-DE")} Einträge...`;
  const ok=await storePZNRecords(records);
  if(ok){
    LS.set("sdro_pzn_dl",{date:td(),count:records.length});
    if(statusEl){statusEl.style.background="var(--greenlo)";statusEl.style.color="var(--green)";statusEl.textContent=`✓ ${records.length.toLocaleString("de-DE")} PZNs importiert!`;}
    toast("✓ "+records.length.toLocaleString("de-DE")+" PZNs importiert","ok");
    setTimeout(()=>{closeModal();renderSettings();},1500);
  }else{
    if(statusEl){statusEl.style.background="var(--redlo)";statusEl.style.color="var(--red)";statusEl.textContent="Fehler beim Speichern (IndexedDB)";}
  }
}

// KI-Datenprüfung: nutzt jetzt die vereinte checkMed Funktion
async function runManualDataCheck(){
  if(!apiKey||!apiKey.startsWith("sk-ant-")){toast("Bitte API-Schlüssel eingeben","warn");return;}
  const incomplete=meds.filter(m=>!m.purpose||!m.pillUnit||!m.pzn);
  if(!incomplete.length){toast("✓ Alle Medikamente vollständig","ok");return;}
  toast("Prüfe "+incomplete.length+" Medikamente...","info");
  for(const med of incomplete.slice(0,5)){
    await checkMed(med.id,{silent:true,fetchImage:false});
    await new Promise(r=>setTimeout(r,400));
  }
  if(currentView==="list")renderList();
  toast("✓ Datenprüfung abgeschlossen","ok");
}

// ══════════════════════════════════════════════════════════════════
// STARTUP-PRÜFUNG: Unvollständige Medikamente beim Start anzeigen
// ══════════════════════════════════════════════════════════════════
function runStartupCheck(){
  const issues=[];
  meds.forEach(m=>{
    if(!m.expiryDate)issues.push({id:m.id,name:m.name,issue:"Kein MHD eingetragen"});
    if(!m.groupId||!groups.find(g=>g.id===m.groupId))issues.push({id:m.id,name:m.name,issue:"Keine Gruppe zugewiesen"});
    if(!m.purpose)issues.push({id:m.id,name:m.name,issue:"Kein Anwendungsgebiet"});
  });
  if(!issues.length){toast("✓ Alle Medikamente vollständig","ok");return;}
  let html=`<div style="font-size:15px;font-weight:700;margin-bottom:12px">⚠️ Unvollständige Daten (${issues.length})</div>`;
  issues.forEach(({name,issue,id})=>{
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card2);border-radius:8px;margin-bottom:6px;gap:8px">
      <div><div style="font-weight:600;font-size:13px">${h(name)}</div><div style="font-size:11px;color:var(--amber)">${h(issue)}</div></div>
      <button class="btn btn-sm btn-ghost" onclick="closeModal();editMed('${id}')">Bearbeiten</button>
    </div>`;
  });
  html+=`<button class="btn btn-full" style="margin-top:10px" onclick="closeModal()">Schließen</button>`;
  openModal(html,"",true);
}

// ══════════════════════════════════════════════════════════════════
// HINTERGRUND-DIENST: Alle 30 Sekunden Bestände prüfen und korrigieren
// Läuft OHNE KI – rein arithmetische Berechnung
// Prüft: totalPills → count-Konsistenz, fehlende Gesamtzahlen
// ══════════════════════════════════════════════════════════════════
setInterval(()=>{
  let changed=false;
  meds=meds.map(m=>{
    const updated={...m};
    // Falls Stückzahl pro Packung bekannt aber Gesamtzahl fehlt: berechnen
    if(m.pillsPerBlister&&m.count>0&&(m.totalPills===null||m.totalPills===undefined)){
      updated.totalPills=m.count*m.pillsPerBlister;changed=true;
    }
    // Falls count auf 0 aber totalPills noch positiv: korrigieren
    if(m.count===0&&m.totalPills&&m.totalPills>0){
      updated.totalPills=0;changed=true;
    }
    // HINWEIS: count-Konsistenz via pillsPerBlister absichtlich NICHT berechnet.
    // pillsPerBlister = Tabletten pro BLISTER (nicht pro Packung).
    return updated;
  });
  if(changed){save();if(currentView==="list")renderList();}
},30000); // 30 Sekunden Intervall

// ── Startup-Cleanup: Leere Nicht-Favoriten aus der Liste entfernen ──
// (Anforderung: leere Meds verschwinden, außer wenn favorisiert)
(()=>{
  const emptyNonFavs=meds.filter(m=>{
    const isEmpty=m.count===0&&(m.totalPills===0||m.totalPills==null);
    return isEmpty&&!isFav(m.id);
  });
  if(emptyNonFavs.length){
    meds=meds.filter(m=>!emptyNonFavs.find(e=>e.id===m.id));
    save();
    console.log(`Startup-Cleanup: ${emptyNonFavs.length} leere Nicht-Favoriten entfernt:`,emptyNonFavs.map(m=>m.name));
  }
})();
