<!DOCTYPE html><html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/><title>SaDro Fixed</title><style>
body{
  margin:0;
  font-family:system-ui;
  background:#0F172A;
  color:#fff;
}
.card{
  background:#1E293B;
  margin:10px;
  padding:12px;
  border-radius:10px;
}
button{
  background:#3B82F6;
  border:none;
  padding:10px;
  color:#fff;
  border-radius:8px;
  width:100%;
  margin-top:8px;
}
</style></head><body><div class="card">
  <h2>SaDro (Repariert)</h2>
  <button onclick="checkAll()">Alle Medikamente prüfen</button>
</div><div id="list"></div><script>

// ===== STATE =====
let meds = JSON.parse(localStorage.getItem("meds")||"[]");
let checking = new Set();

// ===== RENDER =====
function render(){
  const el = document.getElementById("list");
  el.innerHTML="";
  meds.forEach(m=>{
    el.innerHTML+=`
      <div class="card">
        <b>${m.name||"Unbekannt"}</b><br>
        ${m.image?`<img src="${m.image}" width="100%">`:""}
        <div>${m.status||"nicht geprüft"}</div>
      </div>
    `;
  });
}

// ===== IMAGE SEARCH =====
async function fetchMedImageFromWeb(med){
  try{
    return "https://source.unsplash.com/400x300/?medicine,"+encodeURIComponent(m.name);
  }catch{
    return null;
  }
}

// ===== KI SIMULATION (Original Struktur beibehalten) =====
async function checkMed(med){

  if(checking.has(med.id)) return;
  checking.add(med.id);

  try{

    // STATUS
    med.status="ok";

    // 🔥 FIX: Bildsuche nur wenn fehlt
    if(!med.image){
      med.image = await fetchMedImageFromWeb(med);
    }

  }catch(e){
    console.error(e);
    med.status="error";
  }

  checking.delete(med.id);
}

// ===== ALLE PRÜFEN =====
async function checkAll(){

  for(const med of meds){

    // 🔥 FIX: entscheidet selbst ob Bild nötig ist
    const needsImage = !med.image;

    await checkMed(med, {
      fetchImage: needsImage
    });

    await new Promise(r=>setTimeout(r,300));
  }

  localStorage.setItem("meds",JSON.stringify(meds));
  render();
}

// ===== INIT =====
render();

</script></body>
</html>
