// SUCHE: Symptom- und Medikamenten-Suche mit KI
// Validiert die Eingabe – nur medizinische Begriffe erlaubt
// ══════════════════════════════════════════════════════════════════
function renderSearch(){
  document.getElementById("view-search").innerHTML=`
    <div class="card" style="padding:16px;margin-bottom:12px">
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">Symptom oder Medikament eingeben – KI findet passende Medikamente in deinem Bestand.</p>
      <div style="display:flex;gap:8px">
        <input id="sym-inp" placeholder="z.B. Kopfschmerzen, Fieber, Ibuprofen..." style="flex:1" onkeydown="if(event.key==='Enter')doSearch()" oninput="schedSymSpell(this.value)" autofocus/>
        <button class="btn btn-primary" style="padding:10px 16px" onclick="doSearch()">Suchen</button>
      </div>
      <div id="sym-spell" style="display:none;margin-top:8px"></div>
    </div>
    <div id="search-res"></div>`;
}

// Rechtschreibprüfung mit kurzer Verzögerung nach Tastendruck
let symSpellTimer=null;
function schedSymSpell(val){
  clearTimeout(symSpellTimer);if(val.length<4)return;
  symSpellTimer=setTimeout(async()=>{
    try{
      const raw=await callAI([{role:"user",content:`Rechtschreibung des deutschen medizinischen Begriffs: "${val}". NUR JSON: {"correct":true,"corrected":null}`}],80);
      let p;try{p=parseJ(raw);}catch{return;}
      if(p.corrected&&p.corrected.toLowerCase()!==val.toLowerCase()){
        const spellEl=document.getElementById("sym-spell");if(!spellEl)return;
        spellEl.style.display="block";
        spellEl.innerHTML=`<div class="alert alert-amber">💡<div style="flex:1"><b style="color:var(--amber)">Meintest du: „${h(p.corrected)}"?</b><div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-green btn-sm" onclick="document.getElementById('sym-inp').value='${h(p.corrected)}';document.getElementById('sym-spell').style.display='none';doSearch()">✓ Übernehmen & Suchen</button><button class="btn btn-sm" onclick="document.getElementById('sym-spell').style.display='none'">Behalten</button></div></div></div>`;
      }
    }catch{}
  },450);
}

// Suche ausführen – prüft zuerst ob Eingabe medizinisch sinnvoll ist
async function doSearch(){
  const sym=document.getElementById("sym-inp")?.value?.trim();
  if(!sym)return;
  if(!meds.length){const el2=document.getElementById("search-res");if(el2)el2.innerHTML='<div class="alert alert-amber">Noch keine Medikamente eingetragen.</div>';return;}
  const el=document.getElementById("search-res");
  el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--muted)"><span class="spin" style="font-size:20px">⟳</span><br>Analysiere...</div>`;
  try{
    const list=meds.map(m=>`"${m.name}": ${m.purpose||m.name}`).join("\n");
    // KI prüft zuerst ob Eingabe ein Symptom/Krankheit/Medikament ist
    // Danach sucht sie passende Medikamente
    const raw=await callAI([{role:"user",content:`Eingabe: "${sym}"
Vorhandene Medikamente: ${list}

SCHRITT 1: Ist die Eingabe ein Symptom, eine Krankheit oder ein Medikament?
Wenn NEIN (z.B. zufälliger Text, Essen, Tiere etc.) → {"isMedical":false}

SCHRITT 2: Falls ja, suche passende Medikamente (nur medizinisch korrekte Zuordnung).
Fieber→nur Antipyretika. Halsschmerzen→nur Halsmittel. Magen→nur Magenmittel. etc.

NUR JSON: {"isMedical":true,"results":[{"name":"exakter Name","reason":"med. Begründung max 40 Zeichen"}],"advice":"Hinweis max 60 Zeichen"}`}],500);
    let p;try{p=parseJ(raw);}catch{el.innerHTML='<div class="alert alert-amber">KI-Antwort konnte nicht verarbeitet werden.</div>';return;}
    // Eingabe ist kein medizinischer Begriff → Warnung anzeigen
    if(p.isMedical===false){el.innerHTML=`<div class="alert alert-amber" style="margin-top:8px">⚠️ <div>Bitte ein Symptom, eine Krankheit oder ein Medikament eingeben (z.B. "Kopfschmerzen", "Ibuprofen", "Erkältung").</div></div>`;return;}
    const found=p.results.map(r=>meds.find(m=>m.name.toLowerCase()===r.name.toLowerCase()||m.name.toLowerCase().includes(r.name.toLowerCase().split(" ")[0]))?{...meds.find(m=>m.name.toLowerCase()===r.name.toLowerCase()||m.name.toLowerCase().includes(r.name.toLowerCase().split(" ")[0])),reason:r.reason}:null).filter(Boolean);
    let html="";
    if(p.advice)html+=`<div class="alert alert-blue" style="margin-bottom:10px">ℹ️ ${h(p.advice)}</div>`;
    if(!found.length){html+=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Keine passenden Medikamente in deinem Bestand gefunden.</div>`;el.innerHTML=html;return;}
    found.forEach(m=>{
      const g=groups.find(x=>x.id===m.groupId);
      const thumb=m.photo?`<div class="med-thumb" style="width:auto"><img src="${m.photo}" alt="" style="width:72px;height:72px;border-radius:10px;object-fit:contain;background:#000"/></div>`:g?`<div class="med-thumb">${h(g.emoji)}</div>`:`<div class="med-thumb">💊</div>`;
      const empty=m.count===0&&(m.totalPills===0||m.totalPills==null);
      html+=`<div class="card fade" style="padding:13px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start">
        ${thumb}
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;margin-bottom:3px">${h(m.name)}</div>
          ${m.pzn?`<div style="font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:3px">PZN ${h(m.pzn)}</div>`:""}
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${h(m.reason||"")}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
            ${g?pill(`${h(g.emoji)} ${h(g.name)}`,g.color,g.color+"18"):""}
            ${empty?pill("LEER","var(--red)","var(--redlo)"):pill(`${m.count} ${m.unit}`,"var(--muted)","var(--faint)")}
            ${!empty?`<button onclick="closeModal&&closeModal();openEntModalFor('${m.id}')" style="border:none;background:var(--red);color:#fff;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0">📤 Entnehmen</button>`:""}
          </div>
        </div>
      </div>`;
    });
    el.innerHTML=html;
  }catch(e){
    // Lokale Fallback-Suche wenn KI nicht verfügbar
    const kw=sym.toLowerCase().split(/\s+/).filter(w=>w.length>2);
    const syn={"kopfschmerz":["ibuprofen","aspirin","paracetamol"],"schmerz":["ibuprofen","aspirin","paracetamol","diclofenac"],"fieber":["ibuprofen","aspirin","paracetamol"],"husten":["hustensaft","aspecton","thymian"],"erkältung":["grippostad","wick","aspirin"],"magen":["pantoprazol","omeprazol","iberogast"],"allergie":["cetirizin","loratadin"],"halsschmerzen":["dobendan","strepsils"]};
    const extra=[...kw];kw.forEach(k=>{if(syn[k])extra.push(...syn[k]);});
    const found=meds.map(m=>{const t=(m.name+" "+m.purpose).toLowerCase();const s=extra.filter(k=>t.includes(k)).length;return s?{...m,score:s}:null;}).filter(Boolean).sort((a,b)=>b.score-a.score);
    let html=`<div class="alert alert-amber" style="margin-bottom:10px">⚠️ ${e.code==="NO_KEY"||e.code==="BAD_KEY"||e.code==="HTTP_401"?"KI nicht verfügbar":"KI nicht erreichbar"} – Lokale Stichwortsuche</div>`;
    if(e.code==="NO_KEY"||e.code==="BAD_KEY"||e.code==="HTTP_401")handleAIErr(e);
    if(!found.length)html+=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Keine Treffer.</div>`;
    found.forEach(m=>{const g=groups.find(x=>x.id===m.groupId);const empty=m.count===0;html+=`<div class="card fade" style="padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:10px"><span style="font-size:20px">${g?.emoji||"💊"}</span><div style="flex:1"><div style="font-weight:600;font-size:14px">${h(m.name)}</div><div style="font-size:11px;color:var(--muted)">${m.count} ${m.unit}${g?" · "+g.name:""}</div></div>${!empty?`<button onclick="openEntModalFor('${m.id}')" style="border:none;background:var(--red);color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer">📤</button>`:""}</div>`;});
    el.innerHTML=html;
  }
}

function showStatsModal(){
  // closeable=false: Statistik schließt NICHT beim Klick außerhalb
  openModal('<div id="stats-modal-inner" style="min-height:200px"></div>','',false);
  requestAnimationFrame(()=>{
    const el=document.getElementById('stats-modal-inner');
    if(el)renderStatsInto(el);
  });
}
function renderStats(){openModal('<div style="font-size:15px;font-weight:700;margin-bottom:10px">📊 Statistik</div><div style="font-size:12px;color:var(--muted)">Öffne Einstellungen → Statistik öffnen für die vollständige Auswertung.</div>','center-overlay');}

// Detail-Ansicht für KPI-Kacheln → öffnet im Sub-Modal (Statistik bleibt dahinter)
function showStatDetail(grpId,title,kpiIdx,unitFilter){
  let list=[];
  if(grpId)list=meds.filter(m=>m.groupId===grpId);
  else if(unitFilter)list=meds.filter(m=>m.unit===unitFilter);
  else if(kpiIdx!==null&&kpiIdx!==undefined){
    const kpis=[meds,meds.filter(m=>{const d=daysLeft(m.expiryDate);return d!==null&&d<0;}),meds.filter(m=>{const d=daysLeft(m.expiryDate);return d!==null&&d>=0&&d<30;}),meds.filter(m=>m.lowStock),meds.filter(m=>!m.expiryDate),meds];
    list=kpis[kpiIdx]||[];
  }
  let inner=`<div style="font-weight:700;font-size:15px;margin-bottom:14px;padding-right:24px">${h(title)}</div>`;
  if(!list.length)inner+=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Keine Einträge</div>`;
  list.forEach(m=>{const g=groups.find(x=>x.id===m.groupId);const exp=expInfo(m.expiryDate);inner+=`<div class="card" style="padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px"><span style="font-size:20px;flex-shrink:0">${g?.emoji||"💊"}</span><div style="flex:1"><div style="font-weight:600;font-size:13px">${h(m.name)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${m.count} ${m.unit} · ${g?.name||"–"}</div></div>${exp?pill(`${exp.icon} ${exp.lbl}`,exp.col,exp.bg):""}</div>`;});
  openSubModal(inner);
}
function renderStatsInto(el){
  if(!el)return;
  const total=meds.length;
  const expNow=meds.filter(m=>{const d=daysLeft(m.expiryDate);return d!==null&&d<0;});
  const soon=meds.filter(m=>{const d=daysLeft(m.expiryDate);return d!==null&&d>=0&&d<30;});
  const noDate=meds.filter(m=>!m.expiryDate);
  const lowSt=meds.filter(m=>isLowStock(m));
  const totalU=meds.reduce((s,m)=>s+m.count,0);
  const kpis=[{icon:"💊",lbl:"Medikamente",val:total,col:"var(--accent)",meds},{icon:"🚨",lbl:"Abgelaufen",val:expNow.length,col:expNow.length?"var(--red)":"var(--muted)",meds:expNow},{icon:"⏳",lbl:"< 30 Tage",val:soon.length,col:soon.length?"var(--amber)":"var(--muted)",meds:soon},{icon:"⚠️",lbl:"Fast leer",val:lowSt.length,col:lowSt.length?"var(--red)":"var(--muted)",meds:lowSt},{icon:"📅",lbl:"Kein MHD",val:noDate.length,col:noDate.length?"var(--amber)":"var(--muted)",meds:noDate},{icon:"📦",lbl:"Einheiten ges.",val:totalU,col:"var(--green)",meds}];
  const unitMap={};UNITS.forEach(u=>{const items=meds.filter(m=>m.unit===u);const c=items.reduce((s,m)=>s+m.count,0);if(c>0)unitMap[u]={count:c,items};});
  // Tortendiagramm – nur Gruppen mit Medikamenten
  const pieData=groups.map(g=>{const c=meds.filter(m=>m.groupId===g.id).length;return c>0?{name:g.name,val:c,color:g.color,emoji:g.emoji,id:g.id}:null;}).filter(Boolean);
  let pieSvg="";
  if(pieData.length&&total>0){
    let startAngle=-Math.PI/2;const R=80,cx=100,cy=100;const paths=[];
    pieData.forEach(d=>{
      const angle=2*Math.PI*(d.val/total);const endAngle=startAngle+angle;
      const pct=Math.round(d.val/total*100);
      let lblHtml="";const mid=startAngle+angle/2;
      if(pct>=8){const lx=cx+60*Math.cos(mid),ly=cy+60*Math.sin(mid);lblHtml=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="white">${pct}%</text>`;}
      // SVG arc funktioniert nicht bei 360° (exakt 1 Segment) → Kreis verwenden
      if(angle>=Math.PI*1.9999){
        paths.push(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${d.color}" style="cursor:pointer" onclick="showStatDetail('${d.id}','${h(d.name)}')" title="${h(d.name)}: ${d.val}"/>${lblHtml}`);
      }else{
        const x1=cx+R*Math.cos(startAngle),y1=cy+R*Math.sin(startAngle);
        const x2=cx+R*Math.cos(endAngle),y2=cy+R*Math.sin(endAngle);
        const large=angle>Math.PI?1:0;
        paths.push(`<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${d.color}" style="cursor:pointer" onclick="showStatDetail('${d.id}','${h(d.name)}')" title="${h(d.name)}: ${d.val}"/>${lblHtml}`);
      }
      startAngle=endAngle;
    });
    pieSvg=`<svg viewBox="0 0 200 200" style="max-width:200px;display:block;margin:0 auto">${paths.join("")}</svg>`;
  }
  const archiveCount=(LS.get("sdro_archive")||[]).length;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:15px;font-weight:700">Statistik</div><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="showArchive()" style="font-size:11px">📋 Archiv</button><button class="btn btn-primary btn-sm" onclick="closeModal();showBestandsfuehrung()" style="font-size:11px">📋 Bestandsführung</button></div></div>`;
  html+=`<div class="grid3" style="margin-bottom:14px">`;
  kpis.forEach((k,i)=>{
    const hasDet=k.meds&&k.meds.length>0;
    html+=`<div class="kpi card" ${hasDet?`onclick="showStatDetail(null,'${h(k.lbl)}',${i})"`:""}><div style="font-size:22px;margin-bottom:6px">${k.icon}</div><div class="kpi-num" style="color:${k.col}">${k.val}</div><div class="kpi-lbl">${h(k.lbl)}</div>${hasDet?'<div class="kpi-hint">Details ›</div>':""}</div>`;
  });
  html+=`</div>`;
  if(Object.keys(unitMap).length){
    const uIcon=u=>u==="Packung"?"📦":u==="Blister"?"💊":u==="Flasche"?"🧴":u==="Tube"?"🪥":u==="Spray"?"💨":u==="Ampulle"?"💉":u==="Tablette"?"💊":u==="Kapsel"?"💊":"📋";
    html+=`<div class="card" style="padding:14px;margin-bottom:12px"><div style="font-weight:600;font-size:13px;color:var(--accent);margin-bottom:10px">Einheiten nach Typ</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">`;
    Object.entries(unitMap).forEach(([u,{count,items}])=>{html+=`<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="showStatDetail(null,'${h(u)}',null,'${u}')"><span style="font-size:20px">${uIcon(u)}</span><div><div style="font-weight:700;font-size:16px;line-height:1">${count}</div><div style="font-size:10px;color:var(--muted)">${h(u)}</div></div></div>`;});
    html+=`</div></div>`;
  }
  if(pieData.length){
    html+=`<div class="card" style="padding:14px;margin-bottom:12px"><div style="font-weight:600;font-size:13px;color:var(--accent);margin-bottom:10px">Verteilung nach Gruppen</div>${pieSvg}</div>`;
    html+=`<div class="card" style="padding:14px;margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-weight:600;font-size:13px;color:var(--accent)">Gruppenübersicht</div><button class="btn btn-ghost btn-sm" onclick="openGrpModal()" style="font-size:11px">+ Neue Gruppe</button></div>`;
    groups.forEach(g=>{
      const cnt=meds.filter(m=>m.groupId===g.id).length;const pct=total>0&&cnt>0?Math.round(cnt/total*100):0;
      html+=`<div style="margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="showStatDetail('${g.id}','${h(g.name)}')"><span style="font-size:16px">${h(g.emoji)}</span><span style="width:10px;height:10px;border-radius:50%;background:${g.color};flex-shrink:0;display:inline-block"></span><span style="font-size:13px;font-weight:600;color:var(--text)">${h(g.name)}</span><span style="font-size:11px;color:var(--muted)">${cnt} Med.</span></div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0">${cnt>0?`<span style="background:${g.color};color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">${pct}%</span>`:'<span style="font-size:10px;color:var(--muted)">leer</span>'}<button class="btn btn-sm" style="padding:3px 8px;font-size:11px" onclick="openGrpModal(${JSON.stringify(g).replace(/"/g,'&quot;')},true)">✏️</button><button class="btn btn-sm" style="padding:3px 8px;font-size:11px;background:var(--redlo);color:var(--red)" onclick="deleteGroupFromStats('${g.id}','${h(g.name)}',${cnt})">🗑️</button></div></div>${cnt>0?`<div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:${g.color};box-shadow:0 0 0 1px ${g.color}55"></div></div>`:'<div style="height:5px;background:var(--faint);border-radius:3px"></div>'}</div>`;
    });
    html+=`</div>`;
    const warn=[{lbl:"Abgelaufen",list:expNow,col:"var(--red)",bg:"var(--redlo)"},{lbl:"< 30 Tage",list:soon,col:"var(--amber)",bg:"var(--amberlo)"},{lbl:"Kein MHD",list:noDate,col:"var(--muted)",bg:"var(--faint)"}].filter(x=>x.list.length);
    warn.forEach(({lbl,list,col,bg})=>{html+=`<div class="card" style="padding:10px 12px;margin-bottom:8px;background:${bg};border:1px solid ${col}44"><div style="font-size:11px;font-weight:700;color:${col};margin-bottom:3px">${lbl} (${list.length})</div><div style="font-size:11px;color:var(--muted)">${list.map(m=>h(m.name)).join(", ")}</div></div>`;});
  }
  if(!total)html+=`<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:44px;margin-bottom:10px">📊</div><div style="font-size:13px">Noch keine Daten</div></div>`;
  el.innerHTML=html;
}
