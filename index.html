<style>
/* ── CSS-Variablen: Farben und Abstände für Hell- und Dunkel-Modus ── */
:root{
  --bg:#F0F4F8;--surface:#fff;--card:#fff;--card2:#F8FAFC;
  --border:#CBD5E1;--accent:#2563EB;--acclo:rgba(37,99,235,.12);
  --text:#0F172A;--muted:#64748B;--faint:#E2E8F0;
  --green:#16A34A;--red:#DC2626;--amber:#D97706;
  --greenlo:#DCFCE7;--redlo:#FEE2E2;--amberlo:#FEF3C7;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadowmd:0 4px 16px rgba(0,0,0,.12);
}
/* Dunkel-Modus Variablen */
[data-dark]{
  --bg:#0F172A;--surface:#1E293B;--card:#1E293B;--card2:#263348;
  --border:#334155;--accent:#3B82F6;--acclo:rgba(59,130,246,.12);
  --text:#F1F5F9;--muted:#64748B;--faint:#1A2540;
  --green:#22C55E;--red:#EF4444;--amber:#F59E0B;
  --greenlo:rgba(20,83,45,.4);--redlo:rgba(127,29,29,.4);--amberlo:rgba(120,53,15,.4);
  --shadow:0 1px 4px rgba(0,0,0,.3);--shadowmd:0 4px 16px rgba(0,0,0,.5);
}
/* ── Basis-Reset ── */
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
button{font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;}
button:active{transform:scale(.96);}
input,select{font-family:inherit;background:var(--card2);color:var(--text);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--acclo);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
/* ── Layout: Kopfzeile, Navigation, Inhaltsbereich ── */
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;box-shadow:var(--shadow);position:sticky;top:0;z-index:100;}
#header-inner{max-width:720px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
#logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;}
#logo span{color:var(--accent);}
#logo small{color:var(--muted);font-weight:400;font-size:12px;}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
#nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:99;}
#nav-inner{max-width:720px;margin:0 auto;display:flex;}
.nav-btn{flex:1;padding:11px 4px;border:none;background:none;font-size:11px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;}
.nav-btn.active{font-weight:700;color:var(--accent);border-bottom-color:var(--accent);}
#body{padding:14px;padding-bottom:90px;}
#body-inner{max-width:720px;margin:0 auto;}
/* ── Wiederverwendbare Karten- und Pille-Elemente ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
/* ── Button-Varianten ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;background:var(--faint);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-ghost{background:var(--acclo);color:var(--accent);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-full{width:100%;}
/* ── Fixierte Aktions-Buttons (FAB) ── */
#fab-add{position:fixed;bottom:24px;left:20px;height:44px;padding:0 18px;border-radius:22px;background:var(--green);color:#fff;border:none;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(22,163,74,.4);z-index:90;}
#fab-ent{position:fixed;bottom:24px;right:20px;height:44px;padding:0 18px;border-radius:22px;background:var(--red);color:#fff;border:none;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(220,38,38,.4);z-index:90;}
#btn-up{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:7px 18px;font-size:12px;font-weight:600;box-shadow:var(--shadowmd);z-index:89;display:none;}
/* ── Modal / Overlay: Hintergrund-Verdunkelung und Inhaltsblatt ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.sheet{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:44px 18px 32px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadowmd);}
.center-overlay{align-items:center;padding:20px;}
.dialog{border-radius:16px;max-width:380px;padding-top:44px;}
/* ── Hinweis-Boxen ── */
.alert{padding:10px 14px;border-radius:10px;display:flex;gap:8px;align-items:flex-start;font-size:13px;margin-bottom:8px;}
.alert-red{background:var(--redlo);border:1px solid rgba(220,38,38,.3);}
.alert-amber{background:var(--amberlo);border:1px solid rgba(217,119,6,.3);}
.alert-green{background:var(--greenlo);border:1px solid rgba(22,163,74,.3);}
.alert-blue{background:var(--acclo);border:1px solid rgba(37,99,235,.3);}
/* ── Gruppen-Kopfzeile in der Übersicht ── */
.grp-hdr{padding:10px 14px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-radius .15s;}
.grp-hdr.open{border-radius:8px 8px 0 0;}
/* ── Medikamenten-Zeile in der Übersicht ── */
.med-row{padding:10px 13px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);}
.med-row:last-child{border-bottom:none;}
.med-thumb{min-width:60px;max-width:120px;width:72px;height:72px;border-radius:10px;background:var(--faint);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;}
.med-thumb img{width:100%;height:100%;object-fit:contain;background:#000;}
/* ── Ein/Aus-Schalter (Toggle) ── */
.toggle{width:40px;height:22px;border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
.toggle-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
/* ── Balken-Diagramm für Statistiken ── */
.stat-bar{height:8px;border-radius:4px;overflow:hidden;background:var(--border);}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .6s;min-width:4px;}
/* ── Raster-Layouts ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
/* ── KPI-Kacheln in der Statistik ── */
.kpi{padding:14px;border-radius:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;background:var(--card);border:1.5px solid var(--border) !important;box-shadow:var(--shadow);}
.kpi:hover{transform:scale(1.03);box-shadow:var(--shadowmd);}
.kpi-num{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.kpi-hint{font-size:10px;color:var(--accent);margin-top:4px;font-weight:600;}
/* ── Farb-Auswahl für Gruppen ── */
.color-grid{display:flex;flex-wrap:wrap;gap:6px;}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;outline:3px solid transparent;outline-offset:2px;transition:outline .1s;}
.color-dot.sel{outline-color:var(--text);}
/* ── Emoji-Auswahl ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;max-height:150px;overflow-y:auto;}
.emoji-btn{font-size:22px;padding:4px;background:none;border:none;border-radius:6px;line-height:1;}
/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .18s ease;}
/* ── Toast-Benachrichtigung ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;box-shadow:var(--shadowmd);display:none;pointer-events:none;max-width:92vw;overflow:hidden;white-space:nowrap;}
@keyframes sdro-ticker{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.toast-tick{display:inline-block;white-space:nowrap;padding-right:30px;}
/* ── Bezeichnung über Eingabefeldern ── */
.lbl{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;}
.fw{margin-bottom:12px;}
/* ── Rotations-Griff für Foto-Drehung ── */
#rot-handle{
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);border:3px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.35);
  cursor:grab;position:absolute;
  top:-24px;left:50%;transform:translateX(-50%);
  z-index:20;touch-action:none;
}
#rot-handle:active{cursor:grabbing;}
</style>

// Echtzeit-Listener: Änderungen anderer Geräte sofort empfangen
function startFirebaseListener(){
  if(_fbListening||!initFirebase())return;
  _fbListening=true;
  _fbDb.ref("/sadro").keepSynced(true); // Verbindung aufrecht erhalten
  _fbDb.ref("/sadro").on("value",snap=>{

    if(lastTs&&p.ts<=lastTs)return; // Keine älteren Daten laden

async function syncPush(){

  if(_syncRunning)return;_syncRunning=true;
  const el=document.getElementById("sync-lbl");

  }finally{_syncRunning=false;}
}

// Manuell laden (für Refresh-Button)
async function syncPull(){
  if(!initFirebase()){toast("Firebase nicht verfügbar","warn");return;}
  const el=document.getElementById("sync-lbl");
  if(el){el.style.color="var(--amber)";el.textContent="Lade...";}
  try{

    const p=snap.val();
    if(!p){toast("Noch keine Daten in Firebase","info");if(el){el.style.color="var(--muted)";el.textContent="Leer";}return;}
    // Sicherheit: nur laden wenn Firebase echte Daten hat (kein Überschreiben mit leer)
    if(p.meds&&p.meds.length>0){meds=p.meds;}
    else if(p.meds&&p.meds.length===0&&meds.length>0){
      // Firebase leer, lokal hat Daten → lokal gewinnt, hochladen
      console.warn("syncPull: Firebase leer, behalte lokale Daten");
    }
    if(p.groups&&p.groups.length>0)groups=p.groups;
    if(p.users&&p.users.length>0)users=p.users;
    if(p.log)LS.set("sdro_log",p.log);
    save();LS.set("sdro_sync_ts",p.ts||new Date().toISOString());
    if(currentView==="list")renderList();else if(currentView==="settings")renderSettings();
    updateUserIndicator();
    if(el){el.style.color="var(--green)";el.textContent="✓ Geladen";}
    toast(`☁️ ${p.meds?.length||0} Medikamente geladen`,"ok");
    // Neuinstallation: wenn User aus Firebase geladen aber currentUser unbekannt → Auswahl zeigen
    if(p.users&&p.users.length>1&&!p.users.find(u=>u.id===currentUserId)){
      setTimeout(()=>showUserSelectOnStart(),600);
    }
  }catch(e){
    if(el){el.style.color="var(--red)";el.textContent="Fehler";}
    toast("Laden fehlgeschlagen: "+e.message,"warn");
  }
}

// Heutiges Datum als ISO-String (YYYY-MM-DD)
function td(){return new Date().toISOString().slice(0,10);}

// Datum in deutsches Format umwandeln (DD.MM.YYYY)
function fmtDate(s){return s?new Date(s).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}):"–";}

// Tage bis Ablaufdatum berechnen
function daysLeft(s){return s?(new Date(s)-new Date())/864e5:null;}

// Ablauf-Informationen für Farbgebung und Anzeige
function expInfo(s){
  const d=daysLeft(s);if(d===null)return null;
  if(d<0) return{col:"var(--red)",  bg:"var(--redlo)",  lbl:"Abgelaufen",icon:"🚨",urgent:true};
  if(d<30)return{col:"var(--red)",  bg:"var(--redlo)",  lbl:Math.round(d)+" Tage",icon:"⚠️",urgent:true};
  if(d<90)return{col:"var(--amber)",bg:"var(--amberlo)",lbl:Math.round(d/30)+" Mo.",icon:"⏳",urgent:false};
  return      {col:"var(--green)", bg:"var(--greenlo)", lbl:"OK",icon:"✅",urgent:false};
}

// Datum auf Ende des Monats setzen (z.B. 2026-06-01 → 2026-06-30)
function toEndOfMonth(dateStr){
  if(!dateStr)return "";
  const parts=dateStr.split("-");
  if(parts.length<2)return dateStr;
  const y=parseInt(parts[0]),mo=parseInt(parts[1]);
  const lastDay=new Date(y,mo,0).getDate(); // Tag 0 des Folgemonats = letzter Tag dieses Monats
  return `${parts[0]}-${parts[1]}-${String(lastDay).padStart(2,"0")}`;
}

// Eindeutige Farbe für neue KI-Gruppe wählen (keine bereits verwendete)
function getUniqueColor(){
  const usedColors=new Set(groups.map(g=>g.color));
  const available=COLORS.filter(c=>!usedColors.has(c));
  if(available.length>0)return available[Math.floor(Math.random()*available.length)];
  return COLORS[Math.floor(Math.random()*COLORS.length)]; // Fallback wenn alle belegt
}

// Toast-Meldung anzeigen (kurze Benachrichtigung unten)
// ══ Toast: kurz=normal, lang=Laufschrift ══
function toast(msg,type="ok"){
  const el=document.getElementById("toast");
  const isLong=(typeof msg==="string"&&msg.length>52);
  if(isLong){
    // Animationsdauer: proportional zur Textlänge (min 8s, max 18s)
    const dur=Math.min(18,Math.max(8,Math.round(msg.length/6)));
    el.innerHTML="";
    const sp=document.createElement("span");
    sp.className="toast-tick";
    sp.style.animation=`sdro-ticker ${dur}s linear`;
    sp.textContent=msg;
    el.appendChild(sp);
    el.style.background=type==="warn"?"var(--red)":type==="info"?"var(--accent)":"var(--green)";
    el.style.color="#fff";el.style.display="block";
    clearTimeout(el._t);
    // Erst nach vollständigem Ablauf ausblenden
    el._t=setTimeout(()=>el.style.display="none",(dur+0.3)*1000);
  }else{
    el.textContent=msg;
    el.style.background=type==="warn"?"var(--red)":type==="info"?"var(--accent)":"var(--green)";
    el.style.color="#fff";el.style.display="block";
    clearTimeout(el._t);el._t=setTimeout(()=>el.style.display="none",3400);
  }
}

    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:hasImage?"claude-sonnet-4-6":"claude-haiku-4-5-20251001",max_tokens,messages})
  });
  if(!r.ok){const b=await r.json().catch(()=>({}));throw Object.assign(new Error("HTTP "+r.status+": "+(b?.error?.message||"")),{code:"HTTP_"+r.status});}

// JSON aus KI-Antwort extrahieren (ignoriert Markdown-Code-Blöcke)
function parseJ(raw){const m=raw.match(/\{[\s\S]*\}/);return JSON.parse(m?m[0]:raw.trim());}

// Fehlerbehandlung für KI-Fehler mit passenden Meldungen
function handleAIErr(e){
  if(e.code==="NO_KEY"||e.code==="BAD_KEY"){toast("API-Schlüssel fehlt/ungültig → Einstellungen","warn");setView("settings");return;}
  if(e.code==="HTTP_401"){toast("API-Schlüssel abgelehnt → bitte neu eingeben","warn");setView("settings");return;}
  if(e.code==="HTTP_400"){const msg=e.message||"";if(msg.includes("credit")||msg.includes("balance")){toast("💳 Guthaben aufgebraucht → console.anthropic.com","warn");}else{toast("KI-Fehler (400) – Key prüfen","warn");}return;}
  toast("KI-Fehler: "+e.message,"warn");
}

// KI-BILD-SUCHE: Produktfoto aus dem Internet laden
// Wird aufgerufen wenn ein Medikament ohne Foto gespeichert wurde
// ══════════════════════════════════════════════════════════════════
async function fetchMedImageFromWeb(medId){
  const med=meds.find(m=>m.id===medId);
  if(!med)return;
  // NUR überspringen wenn bereits eine Web-URL vorhanden – Kamera-Fotos nicht blockieren
  if(med.photoIsUrl&&med.photo)return;
  const key=(apiKey||LS.get("sdro_k")||"").trim();
  if(!key||!key.startsWith("sk-ant-"))return;
  try{
    // KI mit Websuche nach Produktbild-URL fragen
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",max_tokens:400,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:`Suche ein Produktfoto der deutschen Medikamentenverpackung "${med.name}"${med.pzn?" PZN "+med.pzn:""}${med.manufacturer?" Hersteller "+med.manufacturer:""}.
Suche auf shop-apotheke.com, aponeo.de oder docmorris.de.
Antworte NUR mit einer einzigen direkten Bild-URL (https://...). Keine anderen Texte, kein Markdown.`}]
      })
    });
    if(!r.ok)return;
    const resp=await r.json();
    const text=resp.content.filter(c=>c.type==="text").map(c=>c.text).join("").trim();
    // URL aus Antwort extrahieren
    const urlMatch=text.match(/https?:\/\/\S+\.(?:jpg|jpeg|png|webp)(?:\?\S*)?/i)||text.match(/https?:\/\/\S{20,}/);
    if(!urlMatch)return;
    const imgUrl=urlMatch[0].replace(/[.,;)]+$/,"");
    if(!imgUrl.startsWith("http"))return;
    // URL direkt speichern — kein fetch nötig, <img src> funktioniert ohne CORS
    const currentMed=meds.find(m=>m.id===medId);
    if(currentMed){
      // !! Kamera-Fotos (base64) im photos[]-Array BEIBEHALTEN !!
      const keepPhotos=(currentMed.photos||[]).filter(p=>p&&typeof p==='string'&&p.startsWith('data:'));
      meds=meds.map(m=>m.id===medId?{
        ...m,
        photo:imgUrl,       // URL als Haupt-Anzeige-Foto
        photoIsUrl:true,
        photos:keepPhotos.length>0?keepPhotos:[imgUrl]  // Kamera erhalten
      }:m);
      save();if(currentView==="list")renderList();
      toast("📸 Online-Foto für "+med.name+" verknüpft","ok");
    }
  }catch(e){console.warn("fetchMedImageFromWeb:",e);}
}

async function autoGroup(name){

// ── IndexedDB für BfArM BtM-Liste ──
let _pznDB=null;
async function initPZNDB(){
  if(_pznDB)return _pznDB;
  return new Promise(resolve=>{
    try{
      const req=indexedDB.open("SadroPZN",2);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains("pzn"))db.createObjectStore("pzn",{keyPath:"pzn"});
      };
      req.onsuccess=e=>{_pznDB=e.target.result;resolve(_pznDB);};
      req.onerror=()=>resolve(null);
    }catch{resolve(null);}
  });
}

async function storePZNRecords(records){
  const db=await initPZNDB();if(!db)return false;
  return new Promise(resolve=>{
    try{
      const tx=db.transaction("pzn","readwrite");const store=tx.objectStore("pzn");
      records.forEach(r=>store.put(r));
      tx.oncomplete=()=>resolve(true);tx.onerror=()=>resolve(false);
    }catch{resolve(false);}
  });
}

async function lookupPZNInDB(pzn){
  const padded=String(pzn).padStart(8,"0");
  // Zuerst OTC-Bundle prüfen (sofort, kein async)
  if(OTC_BUNDLE[padded])return OTC_BUNDLE[padded];
  // Dann IndexedDB (BfArM BtM-Liste)
  const db=await initPZNDB();if(!db)return null;
  return new Promise(resolve=>{
    try{
      const tx=db.transaction("pzn","readonly");const req=tx.objectStore("pzn").get(padded);
      req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>resolve(null);
    }catch{resolve(null);}
  });
}

async function getPZNDBCount(){
  const db=await initPZNDB();if(!db)return 0;
  return new Promise(resolve=>{
    try{const tx=db.transaction("pzn","readonly");const req=tx.objectStore("pzn").count();req.onsuccess=()=>resolve(req.result||0);req.onerror=()=>resolve(0);}catch{resolve(0);}
  });
}

// BfArM-Liste via CORS-Proxy herunterladen
async function downloadPZNList(onProgress){
  const CORS_PROXIES=[
    "https://corsproxy.io/?",
    "https://api.allorigins.win/raw?url=",
    "https://cors-anywhere.herokuapp.com/",
  ];
  const TARGET="https://www2.bfarm.de/PZN/PZN.txt";
  let text=null;
  for(const proxy of CORS_PROXIES){
    try{
      if(onProgress)onProgress("Versuche: "+proxy.split("/")[2]+"...");
      const url=proxy+encodeURIComponent(TARGET);
      const resp=await fetch(url,{signal:AbortSignal.timeout(12000)});
      if(!resp.ok)continue;
      text=await resp.text();
      if(text&&text.length>1000)break;
    }catch{continue;}
  }
  if(!text||text.length<1000)return{success:false,error:"Alle CORS-Proxies fehlgeschlagen. Bitte später erneut versuchen."};
  if(onProgress)onProgress("Verarbeite Einträge...");
  const lines=text.split("\n");
  const records=[];
  for(let i=2;i<lines.length;i++){
    const parts=lines[i].split(";");
    if(parts.length>=4&&parts[0].trim().length>=5){
      records.push({pzn:parts[0].trim().padStart(8,"0"),name:parts[3]?.trim()||"",form:parts[4]?.trim()||"",unit:parts[1]?.trim()||""});
    }
  }
  if(!records.length)return{success:false,error:"Keine Einträge im Download gefunden"};
  if(onProgress)onProgress("Speichere "+records.length+" Einträge...");
  const ok=await storePZNRecords(records);
  if(!ok)return{success:false,error:"Speicherfehler (IndexedDB)"};
  LS.set("sdro_pzn_dl",{date:td(),count:records.length});
  return{success:true,count:records.length};
}

// 1) Lokale BtM-DB (BfArM) → schnell, offline-fähig
// 2) Anthropic API + Websuche → umfassend, auch Non-BtM-Meds

// Lokaler PZN-Cache (API-Ergebnisse, 30 Tage)
function getPZNCache(){return LS.get("sdro_pzn_cache")||{};}
function setPZNCache(pzn,data){
  const cache=getPZNCache();
  cache[String(pzn).padStart(8,"0")]={...data,ts:Date.now()};
  const keys=Object.keys(cache);
  if(keys.length>500){const sorted=keys.sort((a,b)=>(cache[a].ts||0)-(cache[b].ts||0));sorted.slice(0,keys.length-500).forEach(k=>delete cache[k]);}
  LS.set("sdro_pzn_cache",cache);
}
function lookupPZNInCache(pzn){
  const cache=getPZNCache();const entry=cache[String(pzn).padStart(8,"0")];
  if(!entry)return null;
  return(Date.now()-(entry.ts||0))/864e5<30?entry:null;
}

// PZN-Daten über Anthropic API + web_search abrufen (mit Cache)
async function fetchPZNDataFromAPI(pzn,medName){
  // 1) OTC-Bundle prüfen
  const bundled=OTC_BUNDLE[String(pzn).padStart(8,"0")];
  if(bundled)return bundled;
  // 2) BfArM IndexedDB
  const local=await lookupPZNInDB(pzn);
  if(local)return local;
  // 3) localStorage-Cache (vorherige API-Ergebnisse)
  const cached=lookupPZNInCache(pzn);
  if(cached)return cached;
  // 4) Anthropic API (letzter Fallback – kostet Tokens)
  const key=(apiKey||LS.get("sdro_k")||"").trim();
  if(!key||!key.startsWith("sk-ant-"))return null;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",max_tokens:400,
        messages:[{role:"user",content:`Suche exakte Daten für PZN ${pzn}${medName?` (${medName})`:""}. Nutze ifap.de oder shop-apotheke.com.
NUR JSON: {"found":true,"name":"Name","manufacturer":"Hersteller","form":"Tabletten etc.","strength":"400 mg etc."}
Nicht gefunden: {"found":false}`}]
      })
    });
    if(!r.ok)return null;
    const data=await r.json();
    const text=data.content.filter(c=>c.type==="text").map(c=>c.text).join("");
    const m=text.match(/\{[\s\S]*?\}/);if(!m)return null;
    const parsed=JSON.parse(m[0]);
    if(parsed.found){setPZNCache(pzn,parsed);return parsed;}
    return null;
  }catch{return null;}
}

// VEREINTE MEDIKAMENTEN-PRÜFUNG: Eine Funktion für alles
// Ersetzt beide alten Funktionen (autoFindPZNForMed + validateAndCheckMed)
// Ablauf:
//   1) Lokale DB prüfen (OTC-Bundle + IndexedDB) → kostenlos
//   2) Fehlende Felder aus lokaler DB befüllen
//   3) Falls lokal nicht gefunden: 1 API-Call der gleichzeitig:
//      - PZN sucht/validiert
//      - Alle fehlenden Felder befüllt (name, purpose, pillUnit, etc.)
//      - Unstimmigkeiten erkennt
//   4) Nach erfolgreicher Prüfung: Bild automatisch laden (falls kein Foto)
// ══════════════════════════════════════════════════════════════════
let _checking=new Set();

async function checkMed(medId, opts={}){
  if(_checking.has(medId))return;
  _checking.add(medId);
  const {silent=false, fetchImage=true}=opts;
  try{
    let med=meds.find(m=>m.id===medId);if(!med)return;
    const skipped=LS.get("sdro_skip_val")||[];if(skipped.includes(medId))return;
    const norm=s=>(s||"").toLowerCase().replace(/[^a-z0-9äöüß]/g,"");
    const hasKey=!!(apiKey&&apiKey.startsWith("sk-ant-"));

    // ── STUFE 1: Lokale DB (kostenlos) ──────────────────────────────
    let localData=null;
    if(med.pzn){
      localData=await lookupPZNInDB(med.pzn);
      if(!localData)localData=lookupPZNInCache(med.pzn);
    }

    if(localData){
      // Fehlende Felder aus lokaler DB befüllen (kein API nötig!)
      const fill={};
      if(!med.purpose&&localData.purpose)fill.purpose=localData.purpose;
      if(!med.pillUnit&&localData.form){
        const formMap={"tabletten":"Tablette","kapseln":"Kapsel","ampullen":"Ampulle","tropfen":"Tropfen","spray":"Spray","salbe":"Salbe","creme":"Creme","gel":"Gel","lösung":"Lösung","suspension":"Suspension","dragees":"Dragee","brausetabletten":"Tablette"};
        const fNorm=localData.form.toLowerCase().replace(/\s/g,"");
        const mapped=Object.entries(formMap).find(([k])=>fNorm.includes(k));
        if(mapped)fill.pillUnit=mapped[1];
      }
      if(!med.manufacturer&&localData.manufacturer)fill.manufacturer=localData.manufacturer;
      if(!med.strength&&localData.strength)fill.strength=localData.strength;

      // Unstimmigkeiten prüfen
      const issues=[];
      if(localData.name&&med.name){
        const srcW=(localData.name||"").split(/\s+/).filter(w=>w.length>3);
        const medW=(med.name||"").split(/\s+/).filter(w=>w.length>3);
        const ok=srcW.some(w=>norm(med.name).includes(norm(w)))||medW.some(w=>norm(localData.name||"").includes(norm(w)));
        if(!ok)issues.push({field:"Medikamentname",ours:med.name,theirs:localData.name});
      }

      med={...med,...fill,pznStatus:issues.length?"conflict":"ok",pznChecked:td()};
      meds=meds.map(m=>m.id===medId?med:m);
      save();if(currentView==="list")renderList();
      if(issues.length){showPZNConflictDialog(medId,localData,null,issues);return;}
      if(!silent)toast("✅ "+med.name+" lokal geprüft","ok");
      // Gruppe zuweisen (gleiche Logik)
      if(!med.groupId||med.groupId===groups[groups.length-1]?.id){
        const purpose2=(fill.purpose||med.purpose||localData.purpose||"").toLowerCase();
        const name2=(med.name||"").toLowerCase();
        const grpKw2={"Herz & Kreislauf":["herz","blutdruck","cholesterol","kardio","beta","ace"],"Schmerz & Entzündung":["schmerz","ibuprofen","diclofenac","paracetamol","aspirin","entzündung"],"Erkältung & Grippe":["erkältung","grippe","husten","schnupfen","fieber"],"Magen & Darm":["magen","darm","gastrit","sodbrennen","säure","pantoprazol","omeprazol"],"Allergie":["allergie","antihistamin","cetirizin","loratadin"],"Diabetes":["diabetes","insulin","metformin","blutzucker"],"Auge":["auge","augentropfen","glaukom","konjunktivitis"],"Haut":["haut","dermat","salbe","creme","ekzem","psoriasis"],"Psyche & Nerven":["antidepress","schlaf","beruhigung","nervosi"],"Antibiotika":["antibiotika","antibiose","amoxicillin","penicillin","infekt"],"Schilddrüse":["schilddrüse","levothyroxin","jod"],"Atemwege":["asthma","copd","inhalat","salbutamol","bronchodilat","atemweg"]};
        for(const [gn,kws] of Object.entries(grpKw2)){
          if(kws.some(kw=>purpose2.includes(kw)||name2.includes(kw))){
            let tg=groups.find(g=>g.name===gn);
            if(!tg){const gc=["#2563EB","#16A34A","#DC2626","#D97706","#7C3AED","#0891B2","#DB2777","#65A30D","#EA580C","#0284C7","#9333EA","#059669"];const ge={"Herz & Kreislauf":"❤️","Schmerz & Entzündung":"💊","Erkältung & Grippe":"🤧","Magen & Darm":"🫃","Allergie":"🌿","Diabetes":"🩸","Auge":"👁️","Haut":"🧴","Psyche & Nerven":"🧠","Antibiotika":"🦠","Schilddrüse":"🦋","Atemwege":"🫁"};const uc=groups.map(g=>g.color);const col=gc.find(c=>!uc.includes(c))||gc[groups.length%gc.length];tg={id:genId(),name:gn,emoji:ge[gn]||"💊",color:col};groups.push(tg);}
            fill.groupId=tg.id;break;
          }
        }
      }
      med={...med,...fill};meds=meds.map(m=>m.id===medId?med:m);save();
      // Web-Foto laden wenn noch kein URL-Foto vorhanden
      if(fetchImage&&(!med.photoIsUrl||!med.photo)&&hasKey)setTimeout(()=>fetchMedImageFromWeb(medId),500);
      return;
    }

    // ── STUFE 2: API-Call (alles in einem) ──────────────────────────
    if(!hasKey){
      if(!med.pzn&&!silent)toast("Kein API-Schlüssel – PZN unbekannt","info");
      // Auch ohne API-Key: Foto per Websuche laden wenn gewünscht
      if(fetchImage&&!med.photo&&apiKey&&apiKey.startsWith("sk-ant-"))setTimeout(()=>fetchMedImageFromWeb(medId),500);
      return;
    }
    if(!silent)toast("🔍 Prüfe "+med.name+"...","info");
    const key=(apiKey||LS.get("sdro_k")||"").trim();

    // Prompt enthält alle Aufgaben auf einmal
    const hasPZN=!!med.pzn;
    const prompt=hasPZN
      ?`Suche alle verfügbaren Daten für das deutsche Medikament PZN ${med.pzn}${med.name?` (Name: "${med.name}")`:""}. Nutze shop-apotheke.com, ifap.de, aponeo.de oder docmorris.de.
NUR JSON (kein Text):
{"found":true,"name":"Exakter Name","manufacturer":"Hersteller","form":"Tabletten","strength":"400 mg","purpose":"Anwendung max 60 Zeichen","pillUnit":"Tablette","totalPills":20,"pillsPerBlister":10,"blisterCount":2,"pznMatch":true,"activeIngredient":"Wirkstoff wenn bekannt","imageUrl":"https://direkte-bild-url.jpg"}
totalPills=Gesamtanzahl Einheiten als Zahl. imageUrl=direkte URL zu Produktfoto (.jpg/.png/.webp), oder null. Nicht gefunden: {"found":false}`
      :`Suche PZN und alle Daten für das deutsche Medikament "${med.name}"${med.manufacturer?" von "+med.manufacturer:""}${med.strength?" "+med.strength:""}${med.purpose?" ("+med.purpose+")":""}.
Nutze shop-apotheke.com, ifap.de, aponeo.de oder docmorris.de. NUR JSON:
{"found":true,"pzn":"8-stellig","name":"Exakter Name","manufacturer":"Hersteller","form":"Tabletten","strength":"400 mg","purpose":"Anwendung max 60 Zeichen","pillUnit":"Tablette","totalPills":20,"pillsPerBlister":10,"blisterCount":2,"imageUrl":"https://direkte-bild-url.jpg"}
totalPills=Gesamtanzahl als Zahl. imageUrl=direkte Produktfoto-URL oder null. Nicht gefunden: {"found":false}`;

    // ── Kamera-Foto für API suchen: base64 aus photos[] bevorzugen ──
    // med.photo kann URL sein (photoIsUrl:true) – dann ist split(",")[1] = undefined → kaputt!
    // Korrekt: base64-Kamera-Fotos aus med.photos[] verwenden
    const camPhotos=(med.photos||[]).filter(p=>p&&typeof p==='string'&&p.startsWith('data:'));
    const photoForAPI=camPhotos[0]||(
      med.photo&&!med.photoIsUrl&&typeof med.photo==='string'&&med.photo.startsWith('data:')
        ?med.photo:null
    );

    // Prompt: bei Foto speziell auf PZN-Barcode-Erkennung fokussieren
    let msgContent=prompt;
    if(photoForAPI){
      const barcodeFocus=!hasPZN
        ?`Du siehst ein Foto einer deutschen Medikamentenverpackung.\nWICHTIG: Lese die PZN (Pharmazentralnummer) direkt vom Barcode/Etikett – suche "PZN" gefolgt von 7-8 Ziffern.\nLese dann alle weiteren Informationen.\n\n`
        :`Du siehst ein Foto des Medikaments ${med.name}. Validiere die Daten und ergänze fehlende Felder.\n\n`;
      msgContent=[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:photoForAPI.split(",")[1]}},
        {type:"text",text:barcodeFocus+prompt}
      ];
    }

    // Sonnet für Bildanalyse (PZN vom Foto lesen), Haiku für reine Textsuche
    const apiModel=photoForAPI?"claude-sonnet-4-6":"claude-haiku-4-5-20251001";
    const apiTokens=photoForAPI?600:400;

    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:apiModel,max_tokens:apiTokens,messages:[{role:"user",content:msgContent}]})
    });
    if(!r.ok)return;
    const data=await r.json();
    const text=data.content.filter(c=>c.type==="text").map(c=>c.text).join("");
    const match=text.match(/\{[\s\S]*\}/);if(!match)return;
    const p=JSON.parse(match[0]);
    if(!p.found){
      // Medikament nicht in DB – Web-Foto suchen (unabhängig ob Kamera-Foto da)
      if(fetchImage)setTimeout(()=>fetchMedImageFromWeb(medId),500);
      return;
    }

    // PZN im Cache speichern
    setPZNCache(p.pzn||med.pzn,p);

    // Fehlende Felder befüllen
    const fill={};
    if(p.pzn&&!med.pzn)fill.pzn=String(p.pzn).replace(/\D/g,"").padStart(8,"0");
    if(p.purpose&&!med.purpose)fill.purpose=p.purpose;
    if(p.pillUnit&&!med.pillUnit)fill.pillUnit=p.pillUnit;
    if(p.manufacturer&&!med.manufacturer)fill.manufacturer=p.manufacturer;
    if(p.strength&&!med.strength)fill.strength=p.strength;
    if(p.totalPills&&!med.totalPills)fill.totalPills=Number(p.totalPills)||null;
    if(p.activeIngredient&&!med.activeIngredient)fill.activeIngredient=p.activeIngredient;
    if(p.pillsPerBlister&&!med.pillsPerBlister)fill.pillsPerBlister=Number(p.pillsPerBlister)||null;
    if(p.blisterCount&&!med.blisterCount)fill.blisterCount=Number(p.blisterCount)||null;
    // Blister-Cache: NUR schreiben wenn blisterCount > 1 bestätigt (Architektur-Regel)
    {const _bc=Number(fill.blisterCount||p.blisterCount||med.blisterCount||0);if(fill.activeIngredient&&!med.activeIngredient){meds=meds.map(x=>x.id===medId?{...x,activeIngredient:fill.activeIngredient}:x);save();}
        if(fill.pillsPerBlister&&_bc>1)setBlisterPPB(med.id,fill.pillsPerBlister);}
    // Foto aus API-Response direkt übernehmen (kein Extra-API-Call nötig!)
    if(p.imageUrl&&p.imageUrl.startsWith("http")&&!med.photo){fill.photo=p.imageUrl;fill.photos=[p.imageUrl];fill.photoIsUrl=true;}

    // Unstimmigkeiten prüfen (nur bei vorhandenen Werten)
    const issues=[];
    if(hasPZN&&p.name&&med.name){
      const srcW=(p.name||"").split(/\s+/).filter(w=>w.length>3);
      const medW=(med.name||"").split(/\s+/).filter(w=>w.length>3);
      const ok=srcW.some(w=>norm(med.name).includes(norm(w)))||medW.some(w=>norm(p.name||"").includes(norm(w)));
      if(!ok)issues.push({field:"Medikamentname",ours:med.name,theirs:p.name});
    }
    if(hasPZN&&p.manufacturer&&med.manufacturer){
      const mf=s=>norm(s).slice(0,6);
      if(!mf(med.manufacturer).includes(mf(p.manufacturer||""))&&!mf(p.manufacturer||"").includes(mf(med.manufacturer)))
        issues.push({field:"Hersteller",ours:med.manufacturer,theirs:p.manufacturer});
    }
    if(hasPZN&&p.strength&&med.strength){
      const st=s=>s.replace(/\s/g,"").toLowerCase();
      if(!st(med.strength).includes(st((p.strength||"").slice(0,4)))&&!st(p.strength||"").includes(st(med.strength.slice(0,4))))
        issues.push({field:"Stärke",ours:med.strength,theirs:p.strength});
    }

    med={...med,...fill,pznStatus:issues.length?"conflict":"ok",pznChecked:td()};
    meds=meds.map(m=>m.id===medId?med:m);
    save();if(currentView==="list")renderList();

    if(issues.length){showPZNConflictDialog(medId,null,p,issues);return;}
    if(!silent)toast("✅ "+med.name+" geprüft"+(Object.keys(fill).length?" – Felder ergänzt":""),"ok");
    // Gruppe automatisch zuweisen wenn keine vorhanden
    if(!med.groupId||med.groupId===groups[groups.length-1]?.id){
      const purpose=(fill.purpose||med.purpose||"").toLowerCase();
      const name=(med.name||"").toLowerCase();
      const grpKeywords={
        "Herz & Kreislauf":["herz","blutdruck","cholesterol","kardio","beta","ace","arrhythmie","antikoagul"],
        "Schmerz & Entzündung":["schmerz","ibuprofen","diclofenac","paracetamol","aspirin","entzündung","rheuma","arthritis"],
        "Erkältung & Grippe":["erkältung","grippe","husten","schnupfen","fieber","sinusitis","bronchitis","antitussivum"],
        "Magen & Darm":["magen","darm","gastrit","sodbrennen","säure","pantoprazol","omeprazol","laxans","verstopfung","durchfall","diarrhoe"],
        "Allergie":["allergie","antihistamin","cetirizin","loratadin","heuschnupfen","urtikaria"],
        "Diabetes":["diabetes","insulin","metformin","blutzucker","glukose","diabetis"],
        "Auge":["auge","augen","augentropfen","glaukom","konjunktivitis","bindehaut"],
        "Haut":["haut","dermat","salbe","creme","ekzem","psoriasis","pilz","antimykotik"],
        "Psyche & Nerven":["antidepress","schlaf","beruhigung","anxiolytikum","hypnotikum","nervosi","sedativum"],
        "Antibiotika":["antibiotika","antibiose","amoxicillin","penicillin","ciproflox","infekt"],
        "Schilddrüse":["schilddrüse","thyreoid","levothyroxin","jod"],
        "Atemwege":["asthma","copd","inhalat","salbutamol","kortison","bronchodilat","lunge","atemweg"],
      };
      let bestGrp=null;
      for(const [grpName,keywords] of Object.entries(grpKeywords)){
        if(keywords.some(kw=>purpose.includes(kw)||name.includes(kw))){bestGrp=grpName;break;}
      }
      if(bestGrp){
        let targetGrp=groups.find(g=>g.name===bestGrp);
        if(!targetGrp){
          // Neue Gruppe anlegen
          const grpColors=["#2563EB","#16A34A","#DC2626","#D97706","#7C3AED","#0891B2","#DB2777","#65A30D","#EA580C","#0284C7","#9333EA","#059669"];
          const grpEmojis={"Herz & Kreislauf":"❤️","Schmerz & Entzündung":"💊","Erkältung & Grippe":"🤧","Magen & Darm":"🫃","Allergie":"🌿","Diabetes":"🩸","Auge":"👁️","Haut":"🧴","Psyche & Nerven":"🧠","Antibiotika":"🦠","Schilddrüse":"🦋","Atemwege":"🫁"};
          const usedColors=groups.map(g=>g.color);
          const color=grpColors.find(c=>!usedColors.includes(c))||grpColors[groups.length%grpColors.length];
          targetGrp={id:genId(),name:bestGrp,emoji:grpEmojis[bestGrp]||"💊",color};
          groups.push(targetGrp);
        }
        fill.groupId=targetGrp.id;
        // Gruppe direkt auf med anwenden und speichern
        meds=meds.map(m=>m.id===medId?{...m,groupId:targetGrp.id}:m);
        save();if(currentView==="list")renderList();
        if(!silent)toast("🗂️ Gruppe zugewiesen: "+bestGrp,"ok");
      }
    }
    // Web-Foto laden wenn noch kein URL-Foto vorhanden (Kamera-Foto reicht nicht für Anzeige)
    if(fetchImage&&(!med.photoIsUrl||!med.photo))setTimeout(()=>fetchMedImageFromWeb(medId),600);

  }catch(e){handleAIErr(e);}
  finally{_checking.delete(medId);}
}

// App-Update erzwingen
function forceAppUpdate(){
  toast("🔄 Prüfe auf neue Version...", "info");
  // Cache-Parameter nur für den fetch (Versionsprüfung), NICHT für den Reload
  const checkUrl=location.origin+location.pathname+"?_nc="+Date.now();
  const baseUrl=location.origin+location.pathname;
  fetch(checkUrl,{cache:"no-store",headers:{"Pragma":"no-cache","Cache-Control":"no-cache, no-store"}})
    .then(r=>r.text())
    .then(html=>{
      const match=html.match(/window\._buildTime="([^"]+)"/);
      const newVer=match?match[1]:"?";
      if(newVer===window._buildTime){
        toast("✅ Bereits aktuellste Version ("+newVer+")","ok");
      } else {
        toast("🔄 Neue Version: "+newVer+" – lade...", "ok");
        // Browser-Cache leeren, dann mit der sauberen Basis-URL neu laden
        const doClear=("caches" in window)
          ?caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k))))
          :Promise.resolve();
        doClear.finally(()=>setTimeout(()=>location.replace(baseUrl),600));
      }
    })
    .catch(()=>{
      // Fallback: Cache leeren + sauber neuladen
      if("caches" in window) caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).finally(()=>location.replace(baseUrl));
      else location.replace(baseUrl);
    });
}

// Konflikt-Dialog anzeigen: Eingetragene Daten vs. PZN-Datenbank
function showPZNConflictDialog(medId,localData,apiData,issues){
  const med=meds.find(m=>m.id===medId);if(!med)return;
  const src=apiData||localData;
  // Korrigierte Daten für "Überschreiben"-Button zusammenstellen
  const corrected={};
  issues.forEach(i=>{
    if(i.field==="Medikamentname")corrected.name=i.theirs;
    if(i.field==="Hersteller")corrected.manufacturer=i.theirs;
    if(i.field==="Stärke")corrected.strength=i.theirs;
    if(i.field==="Darreichungsform")corrected.pillUnit=i.theirs.replace(/en$/,"").replace(/en$/,"");
  });
  if(src.totalPills&&!med.totalPills)corrected.totalPills=src.totalPills;
  if(src.pillUnit&&!med.pillUnit)corrected.pillUnit=src.pillUnit;
  // In globaler Variable speichern (sicherer als onclick-Attribute)
  _pznConflict={medId,corrected};
  const issueRows=issues.map(i=>`<div style="background:var(--amberlo);border:1px solid rgba(217,119,6,.3);border-radius:8px;padding:10px 12px;margin-bottom:8px">
    <div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${h(i.field)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><div style="font-size:9px;color:var(--red);font-weight:600;margin-bottom:2px">Eingetragen:</div><div style="font-size:12px;font-weight:600">${h(i.ours)}</div></div>
      <div><div style="font-size:9px;color:var(--green);font-weight:600;margin-bottom:2px">PZN-Datenbank:</div><div style="font-size:12px;font-weight:600">${h(i.theirs)}</div></div>
    </div>
  </div>`).join("");
  openModal(`<div style="font-size:16px;font-weight:700;margin-bottom:6px">⚠️ PZN-Unstimmigkeit</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5">Für <b style="color:var(--text)">${h(med.name)}</b> (PZN ${h(med.pzn)}) wurden Abweichungen zur offiziellen PZN-Datenbank festgestellt:</div>
    ${issueRows}
    <div style="font-size:10px;color:var(--muted);margin-bottom:14px;padding:7px 10px;background:var(--faint);border-radius:7px;display:flex;align-items:center;gap:6px">
      ${localData?"🗄️ Quelle: BfArM BtM-Datenbank":"🌐 Quelle: Anthropic Websuche (ifap.de / shop-apotheke.com)"}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-green btn-full" onclick="overwriteMedWithPZNData()">✅ PZN-Daten übernehmen</button>
      <button class="btn btn-full" style="background:var(--redlo);color:var(--red)" onclick="ignoreMedValidation()">🚫 Ignorieren &amp; nicht mehr prüfen</button>
      <button class="btn btn-full" onclick="closeModal()">Schließen</button>
    </div>`,"center-overlay",true);
}

// Medikament mit PZN-Daten überschreiben
function overwriteMedWithPZNData(){
  if(!_pznConflict)return;
  const{medId,corrected}=_pznConflict;
  meds=meds.map(m=>m.id===medId?{...m,...corrected,pznStatus:"ok",pznChecked:td()}:m);
  save();closeModal();if(currentView==="list")renderList();
  toast("✓ Daten mit PZN-Datenbank übernommen","ok");
  _pznConflict=null;
}

// Validierung für dieses Medikament dauerhaft deaktivieren
function ignoreMedValidation(){
  if(!_pznConflict)return;
  const{medId}=_pznConflict;
  // In Ignore-Liste und Status als "ignored" markieren
  const skipped=LS.get("sdro_skip_val")||[];
  if(!skipped.includes(medId)){skipped.push(medId);LS.set("sdro_skip_val",skipped);}
  meds=meds.map(m=>m.id===medId?{...m,pznStatus:"ignored",pznChecked:td()}:m);
  save();closeModal();if(currentView==="list")renderList();
  toast("Validierung für dieses Medikament deaktiviert","info");
  _pznConflict=null;
}

// Aktions-Menü für ein einzelnes Medikament
function openMedActions(medId){
  const med=meds.find(m=>m.id===medId);if(!med)return;
  const hasKey=apiKey&&apiKey.startsWith("sk-ant-");
  const st=med.pznStatus;
  const statusText=st==="ok"?`✅ Geprüft am ${med.pznChecked||"?"}`
    :st==="conflict"?"⚠️ Unstimmigkeit festgestellt"

  openModal(`<div style="font-size:15px;font-weight:700;margin-bottom:4px">${h(med.name)}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">
      ${med.pzn?`PZN: <b style="font-family:monospace">${h(med.pzn)}</b> · `:"Keine PZN · "}${statusText}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${med.pzn?`<button class="btn btn-ghost btn-full" onclick="closeModal();singleValidate('${medId}')">🔍 PZN jetzt prüfen <span style="font-size:10px;color:var(--muted)">(1 API-Call)</span></button>`
        :`<button class="btn btn-ghost btn-full" onclick="closeModal();singleFindPZN('${medId}')">🔍 PZN automatisch suchen <span style="font-size:10px;color:var(--muted)">(1 API-Call)</span></button>`}
      ${!med.photo?`<button class="btn btn-full" style="background:var(--acclo);color:var(--accent)" onclick="closeModal();fetchMedImageManual('${medId}')">📸 Online-Foto suchen <span style="font-size:10px;color:var(--muted)">(1 API-Call)</span></button>`:""}
      ${st==="conflict"?`<button class="btn btn-full" style="background:var(--amberlo);color:var(--amber)" onclick="closeModal();resetMedValidation('${medId}')">🔄 Ignorierung aufheben</button>`:""}
      ${!hasKey?`<div class="alert alert-amber" style="margin-top:4px">⚠️ Kein API-Schlüssel – bitte in Einstellungen eingeben</div>`:""}
      <button class="btn btn-full" onclick="closeModal()">Schließen</button>
    </div>`,"center-overlay",true);
}

// Validierungsstatus zurücksetzen (Ignored → wieder prüfbar)
function resetMedValidation(medId){
  const skipped=(LS.get("sdro_skip_val")||[]).filter(id=>id!==medId);
  LS.set("sdro_skip_val",skipped);
  meds=meds.map(m=>m.id===medId?{...m,pznStatus:undefined,pznChecked:undefined}:m);

}

// FOTO AUTO-BESCHNITT: Dual-Algorithmus
// Ansatz 1: Median-Hintergrunderkennung (Rand-Streifen)
// Ansatz 2: Varianz-Scan von allen 4 Kanten (für Nah-Aufnahmen)
// Nimmt das aggressivere Ergebnis von beiden
// ══════════════════════════════════════════════════════════════════
async function autoCropPhoto(dataUrl){
  // Auto-Crop deaktiviert: Algorithmus schnitt bei Fotos mit Finger/Hand zu aggressiv
  // Das Originalbild wird direkt an die KI-Analyse übergeben
  return{url:dataUrl,cropped:false};
}
async function _autoCropPhoto_disabled(dataUrl){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=img.width;c.height=img.height;
      const ctx=c.getContext("2d");
      ctx.drawImage(img,0,0);
      const W=c.width,H=c.height;
      const px=ctx.getImageData(0,0,W,H).data;
      const FAIL=()=>res({url:dataUrl,cropped:false});

      // ── Hilfsfunktionen ─────────────────────────────────────────────
      const getCol=(x,y)=>{const i=(y*W+x)*4;return[px[i],px[i+1],px[i+2]];};
      const dist3=(a,b)=>Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1])+Math.abs(a[2]-b[2]);
      const grayAt=(x,y)=>{const i=(y*W+x)*4;return 0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];};

      // ── ANSATZ 1: Eckbereiche als Hintergrund-Stichprobe ────────────
      // Nur die 4 Ecken (je 5% der Bildgröße) – zuverlässigster Hintergrund-Indikator
      // Vorteil: Schachtel liegt fast immer in der Bildmitte, Ecken sind meist freier Hintergrund
      const CS=Math.max(4,Math.round(Math.min(W,H)*0.05));
      const cSamples=[];
      for(let cy=0;cy<CS;cy++)for(let cx=0;cx<CS;cx++){
        cSamples.push(getCol(cx,cy),getCol(W-1-cx,cy),getCol(cx,H-1-cy),getCol(W-1-cx,H-1-cy));
      }
      const medC=ch=>{const v=cSamples.map(p=>p[ch]).sort((a,b)=>a-b);return v[v.length>>1];};
      const bg=[medC(0),medC(1),medC(2)];
      // Varianz der Eckpixel: hoch = Schachtel füllt auch die Ecken (Eckdetektion unzuverlässig)
      const bgVar=cSamples.reduce((s,p)=>s+dist3(p,bg),0)/cSamples.length;
      // Schwellwert: aggressiver wenn Ecken homogen (eindeutiger Hintergrund)
      const thr1=Math.max(22,Math.min(70,bgVar*2+18));

      // Bounding Box aller Vordergrund-Pixel (die sich vom Eck-Hintergrund unterscheiden)
      let x1a=W,x2a=0,y1a=H,y2a=0;
      for(let y=0;y<H;y++)for(let x=0;x<W;x++){
        if(dist3(getCol(x,y),bg)>thr1){
          if(x<x1a)x1a=x;if(x>x2a)x2a=x;
          if(y<y1a)y1a=y;if(y>y2a)y2a=y;
        }
      }
      const wA=x2a-x1a,hA=y2a-y1a;

      // ── ANSATZ 2: Sobel-Kantendetektion ─────────────────────────────
      // Summiert Gradientenstärke (Sobel) pro Zeile und Spalte
      // Funktioniert auch wenn Schachtel bis an den Rand geht
      const rowG=new Float32Array(H),colG=new Float32Array(W);
      for(let y=1;y<H-1;y++){
        for(let x=1;x<W-1;x++){
          const gx=grayAt(x+1,y-1)+2*grayAt(x+1,y)+grayAt(x+1,y+1)
                  -grayAt(x-1,y-1)-2*grayAt(x-1,y)-grayAt(x-1,y+1);
          const gy=grayAt(x-1,y+1)+2*grayAt(x,y+1)+grayAt(x+1,y+1)
                  -grayAt(x-1,y-1)-2*grayAt(x,y-1)-grayAt(x+1,y-1);
          const g=Math.hypot(gx,gy);
          rowG[y]+=g/W;colG[x]+=g/H;
        }
      }
      // Median-Gradient als adaptiver Schwellwert
      const medG=arr=>{const s=[...arr].filter(v=>v>0).sort((a,b)=>a-b);return s[s.length>>1]||1;};
      const eThrR=medG(rowG)*0.35,eThrC=medG(colG)*0.35;
      let y1b=0,y2b=H-1,x1b=0,x2b=W-1;
      for(let y=0;y<H;y++){if(rowG[y]>eThrR){y1b=Math.max(0,y-1);break;}}
      for(let y=H-1;y>=0;y--){if(rowG[y]>eThrR){y2b=Math.min(H-1,y+1);break;}}
      for(let x=0;x<W;x++){if(colG[x]>eThrC){x1b=Math.max(0,x-1);break;}}
      for(let x=W-1;x>=0;x--){if(colG[x]>eThrC){x2b=Math.min(W-1,x+1);break;}}
      const wB=x2b-x1b,hB=y2b-y1b;

      // ── BESTES ERGEBNIS WÄHLEN ───────────────────────────────────────
      const pad=Math.round(Math.min(W,H)*0.02);
      const applyPad=(x1,y1,w,h)=>({
        x:Math.max(0,x1-pad),y:Math.max(0,y1-pad),
        w:Math.min(W,x1+w+pad)-Math.max(0,x1-pad),
        h:Math.min(H,y1+h+pad)-Math.max(0,y1-pad)
      });
      const cA=applyPad(x1a,y1a,wA,hA);
      const cB=applyPad(x1b,y1b,wB,hB);
      const aF=W*H;
      const minSide=Math.round(Math.min(W,H)*0.12);
      // Gültig: mind. 8% kleiner als Original, mind. 45% erhalten, Mindestgröße
      const okA=cA.w>minSide&&cA.h>minSide&&cA.w*cA.h<aF*0.90&&cA.w*cA.h>aF*0.50;
      const okB=cB.w>minSide&&cB.h>minSide&&cB.w*cB.h<aF*0.90&&cB.w*cB.h>aF*0.50;

      let crop=null;
      // Wenn beide gültig: konservativerer (größerer) Crop gewinnt → weniger aggressiv
      if(okA&&okB) crop=cA.w*cA.h>=cB.w*cB.h?cA:cB;
      else if(okA) crop=cA;
      else if(okB) crop=cB;
      else{
        // Pixel-Algorithmus fehlgeschlagen → AI-Crop versuchen
        cropWithAI(dataUrl).then(aiResult=>{
          if(aiResult)res(aiResult);
          else FAIL();
        }).catch(()=>FAIL());
        return;
      }

      const nc=document.createElement("canvas");nc.width=crop.w;nc.height=crop.h;
      nc.getContext("2d").drawImage(c,crop.x,crop.y,crop.w,crop.h,0,0,crop.w,crop.h);
      const saved=Math.round((1-crop.w*crop.h/aF)*100);
      const pixelUrl=nc.toDataURL("image/jpeg",.93);
      // AI-Crop als zweiter Pass: wenn Pixel-Crop wenig entfernt hat (<12%), lohnt AI-Verfeinerung
      if(saved<12){
        const key=(apiKey||LS.get("sdro_k")||"").trim();
        if(key&&key.startsWith("sk-ant-")){
          cropWithAI(pixelUrl).then(aiRes=>{
            if(aiRes&&aiRes.saved>5)res({...aiRes,saved:Math.round(saved+(100-saved)*aiRes.saved/100)});
            else res({url:pixelUrl,cropped:true,saved});
          }).catch(()=>res({url:pixelUrl,cropped:true,saved}));
          return;
        }
      }
      res({url:pixelUrl,cropped:true,saved});
    };
    img.onerror=()=>res({url:dataUrl,cropped:false});
    img.src=dataUrl;
  });
}

// AI-CROP: Claude identifiziert die Verpackung und liefert Bounding Box
// Fallback wenn Pixel-Algorithmus keinen Hintergrund findet
// ══════════════════════════════════════════════════════════════════
async function cropWithAI(dataUrl){
  const key=(apiKey||LS.get('sdro_k')||'').trim();
  if(!key||!key.startsWith('sk-ant-'))return null;
  try{
    const base64=dataUrl.split(',')[1];
    const mediaType=dataUrl.startsWith('data:image/png')?'image/png':'image/jpeg';
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,
               'anthropic-version':'2023-06-01',
               'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:120,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:'This is a photo of a medication package. Find the LABEL/TEXT area of the package (not the whole image). Return ONLY valid JSON: {"top":N,"left":N,"width":N,"height":N} where values are % of image size (0-100). Include 3% padding. Only return coordinates if you can find a clear rectangular package label. If the package fills the entire image or no clear border: {"found":false}'}
        ]}]
      })
    });
    if(!r.ok)return null;
    const d=await r.json();
    const txt=d.content?.filter(c=>c.type==='text').map(c=>c.text).join('');
    const m=txt?.match(/\{[^}]+\}/);
    if(!m)return null;
    const bb=JSON.parse(m[0]);
    if(bb.found===false||bb.top===undefined||bb.left===undefined||bb.width===undefined||bb.height===undefined)return null;
    // Bounding Box auf Canvas anwenden
    return new Promise(res=>{
      const img=new Image();
      img.onload=()=>{
        const W=img.width,H=img.height;
        const x=Math.max(0,Math.round(bb.left/100*W));
        const y=Math.max(0,Math.round(bb.top/100*H));
        const w=Math.min(W-x,Math.round(bb.width/100*W));
        const h=Math.min(H-y,Math.round(bb.height/100*H));
        if(w<80||h<80||w*h>=W*H*0.97){res(null);return;}
        const nc=document.createElement('canvas');nc.width=w;nc.height=h;
        nc.getContext('2d').drawImage(img,x,y,w,h,0,0,w,h);
        const saved=Math.round((1-w*h/(W*H))*100);
        res({url:nc.toDataURL('image/jpeg',.93),cropped:true,saved,aiCrop:true});
      };
      img.onerror=()=>res(null);
      img.src=dataUrl;
    });
  }catch{return null;}
}

// ÜBERSICHT: Alle Medikamente nach Gruppen anzeigen
// Leere Gruppen (0 Medikamente) werden NICHT angezeigt

let filterGrp=null;
let expanded=LS.get("sdro_exp")||{};

// ══ Schwellenwert-Prüfung für Bestandswarnung ══
function isLowStock(med){
  const threshold=Number(cfg.lowStockCount)||1;
  const tUnit=cfg.lowStockUnit||"Packung";
  if(tUnit==="Blister"){
    const ppb=getBlisterPPB(med);
    if(ppb&&med.totalPills!=null)return med.totalPills<=ppb*threshold;
    return false;
  }
  const pillUnits=["Tablette","Kapsel","Ampulle","Tropfen","ml"];
  if(pillUnits.includes(tUnit)&&med.totalPills!=null)return med.totalPills<=threshold;
  if(tUnit===med.unit)return med.count<=threshold;
  return med.count<=threshold; // Fallback
}

function renderList(){
  const el=document.getElementById("view-list");
  const soon=meds.filter(m=>{const d=daysLeft(m.expiryDate);return d!==null&&d>=0&&d<cfg.expiryDays;});
  const lowSt=meds.filter(m=>isLowStock(m));
  let html="";

  // Kopfzeile mit Problemanzeige (kein Statistik-Button – ist in Einstellungen)
  const issueCount=meds.filter(m=>!m.expiryDate||!m.groupId||!groups.find(g=>g.id===m.groupId)).length;
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-size:15px;font-weight:700">Medikamentenschrank</div>
    <div style="display:flex;gap:8px;align-items:center">
      ${issueCount>0?`<button onclick="runStartupCheck()" style="border:none;background:var(--redlo);color:var(--red);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">⚠️ ${issueCount} Problem${issueCount!==1?"e":""}</button>`:""}
      <button onclick="showPZNLegend()" style="border:none;background:var(--faint);color:var(--muted);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer" title="PZN-Badge Legende">🏷️</button>
    </div>
  </div>`;

  // Warnmeldungen bei Lagerbestand und Ablauf
  if(lowSt.length&&cfg.notifyLowStock)html+=`<div class="alert alert-red">⚠️ <div><b style="color:var(--red)">Fast leer (≤${cfg.lowStockCount||1} ${cfg.lowStockUnit||"Packung"}):</b> ${lowSt.map(m=>h(m.name)).join(", ")}</div></div>`;
  if(soon.length)html+=`<div class="alert alert-amber">⏳ <div><b style="color:var(--amber)">Läuft bald ab:</b> ${soon.map(m=>h(m.name)).join(", ")}</div></div>`;

  // Filter-Chips für Gruppen-Filterung
  html+=`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none">`;
  const allActive=filterGrp===null;
  html+=`<button onclick="setFilter(null)" style="padding:5px 12px;border-radius:20px;border:1px solid ${allActive?"var(--accent)":"var(--border)"};background:${allActive?"var(--acclo)":"var(--surface)"};color:${allActive?"var(--accent)":"var(--muted)"};font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer">Alle (${meds.length})</button>`;
  // Nur Gruppen mit mindestens 1 Medikament als Filter-Chip anzeigen
  groups.filter(g=>meds.some(m=>m.groupId===g.id)).forEach(g=>{
    const act=filterGrp===g.id;const cnt=meds.filter(m=>m.groupId===g.id).length;
    html+=`<button onclick="setFilter('${g.id}')" style="padding:5px 12px;border-radius:20px;border:1px solid ${act?g.color:"var(--border)"};background:${act?g.color+"20":"var(--surface)"};color:${act?g.color:"var(--muted)"};font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer">${h(g.emoji)} ${h(g.name)} (${cnt})</button>`;
  });
  html+=`</div>`;

  // Gruppen-Ansicht: NUR Gruppen die mindestens 1 Medikament enthalten
  const dispGroups=filterGrp?groups.filter(g=>g.id===filterGrp):groups.filter(g=>meds.some(m=>m.groupId===g.id));
  const orphanMeds=filterGrp?[]:meds.filter(m=>!groups.find(g=>g.id===m.groupId));
  dispGroups.forEach(g=>{
    const gm=meds.filter(m=>m.groupId===g.id);
    if(!gm.length)return; // Leere Gruppen überspringen
    const open=expanded[g.id]!==false;
    html+=`<div style="margin-bottom:8px">
      <div class="grp-hdr ${open?"open":""}" style="background:${g.color}18;border:1px solid ${g.color}35;color:var(--text)" onclick="toggleGrp('${g.id}')">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px;flex-shrink:0">${h(g.emoji)}</span>
          <span style="display:flex;align-items:center;gap:5px;min-width:0;flex:1;overflow:hidden"><span style="width:8px;height:8px;border-radius:50%;background:${g.color};flex-shrink:0"></span><span style="font-weight:600;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(g.name)}</span></span>
          <span style="background:${g.color};color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;margin-left:4px">${gm.length}</span>
        </div>
        <span style="color:var(--muted);font-size:10px">${open?"▲":"▼"}</span>
      </div>`;
    if(open){
      html+=`<div class="card" style="border-top:none;border-radius:0 0 8px 8px;overflow:hidden">`;
      gm.forEach((med,i)=>{
        const exp=expInfo(med.expiryDate);
        const border=i<gm.length-1?"border-bottom:1px solid var(--border)":"";
        // Gesamtzahl berechnen: erst aus totalPills, dann aus pillsPerBlister*count
        const realTotal=med.totalPills!=null?med.totalPills:(med.pillsPerBlister&&med.count?med.count*med.pillsPerBlister:null);
        const pillLine=realTotal?`<span style="font-size:10px;color:var(--accent);font-weight:600">${realTotal} ${med.pillUnit||"Tablette"}</span>`:"";
        const expLine=med.expiryDate
          ?`<span style="font-size:10px;color:${exp?.urgent?exp.col:"var(--muted)"}">⏰ ${fmtDate(med.expiryDate)}</span>`
          :`<span style="font-size:10px;color:var(--red)">⏰ kein MHD</span>`;
        // Thumbnail: schwarzer Hintergrund wenn Bild kleiner als Rahmen
        const thumbHtml=med.photo
          ?`<img src="${med.photo}" onclick="showPhotoModal('${med.id}')" style="cursor:pointer;width:72px;height:72px;border-radius:10px;object-fit:contain;border:2px solid var(--border);background:#000;flex-shrink:0"/>`
          :`<div class="med-thumb" onclick="openMedActions('${med.id}')" style="cursor:pointer;border:2px dashed var(--border);position:relative" title="Kein Foto – klicken für Optionen">
              <span style="font-size:24px">${g.emoji}</span>
              <div style="position:absolute;bottom:2px;right:2px;background:var(--accent);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700">+</div>
            </div>`;
        html+=`<div class="med-row" style="${border}">
          ${thumbHtml}
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;margin-bottom:1px">${h(med.name)}${isFav(med.id)?'<span title="Favorit" style="font-size:11px;margin-left:3px">⭐</span>':''} ${med.strength?" <span style=\"font-size:11px;color:var(--muted);font-weight:400\">"+h(med.strength)+"</span>":""}</div>
            ${med.activeIngredient?`<div style="font-size:10px;color:var(--accent);font-weight:500;margin-bottom:2px">${h(med.activeIngredient)}</div>`:""}
            <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px">
              <span style="font-weight:700;font-size:13px">${med.count} <span style="font-weight:400;color:var(--muted);font-size:12px">${h(med.unit)}</span></span>
              ${pillLine}
            </div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:2px;align-items:center">
              ${med.pzn?(()=>{
                const st=med.pznStatus;
                const badgeCol=st==="ok"?"var(--green)":st==="conflict"?"var(--red)":st==="ignored"?"var(--muted)":"var(--muted)";
                const badgeBg=st==="ok"?"var(--greenlo)":st==="conflict"?"var(--redlo)":st==="ignored"?"var(--faint)":"var(--faint)";
                const badgeIcon=st==="ok"?"✓ ":st==="conflict"?"⚠ ":st==="ignored"?"– ":"? ";
                const badgeTip=st==="ok"?`Geprüft am ${med.pznChecked||""}`:st==="conflict"?"Unstimmigkeit – klicken":st==="ignored"?"Prüfung ignoriert":"Nicht geprüft – klicken";
                return `<span title="${badgeTip}" onclick="openMedActions('${med.id}')" style="font-size:10px;font-family:monospace;color:${badgeCol};background:${badgeBg};padding:1px 6px;border-radius:20px;border:1px solid ${badgeCol}44;cursor:pointer">${badgeIcon}PZN ${h(med.pzn)}</span>`;
              })():`<span onclick="openMedActions('${med.id}')" title="Keine PZN – klicken zum Suchen" style="font-size:10px;color:var(--muted);background:var(--faint);padding:1px 6px;border-radius:20px;border:1px dashed var(--border);cursor:pointer">+ PZN suchen</span>`}
              ${expLine}
              ${isLowStock(med)?pill("⚠ fast leer","var(--red)","var(--redlo)"):""} 
              ${exp&&exp.urgent?pill(exp.icon+" "+exp.lbl,exp.col,exp.bg):""}
            </div>
            <div style="font-size:11px;color:var(--muted)">${h(med.purpose||"")}${med.manufacturer?" · "+h(med.manufacturer):""}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;align-items:center;flex-shrink:0">
            <button style="border:none;background:none;cursor:pointer;font-size:14px;padding:2px" onclick="editMed('${med.id}')">✏️</button>
            <button style="border:none;background:none;cursor:pointer;font-size:14px;padding:2px" onclick="confirmDel('${med.id}')">🗑️</button>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  // Orphan-Medikamente (Gruppe fehlt/gelöscht) in eigenem Bereich zeigen
  if(orphanMeds.length){
    html+=`<div style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--amberlo);border-radius:8px 8px 0 0;border:1px solid var(--amber)35">
      <span style="font-size:14px">⚠️</span><span style="font-weight:600;font-size:12px;color:var(--amber)">Ohne Gruppe (${orphanMeds.length})</span>
      <span style="font-size:10px;color:var(--muted);margin-left:4px">Bitte Gruppe zuweisen</span></div>
      <div class="card" style="border-top:none;border-radius:0 0 8px 8px">`;
    orphanMeds.forEach((med,i)=>{
      const border=i<orphanMeds.length-1?"border-bottom:1px solid var(--border)":"";
      html+=`<div class="med-row" style="${border}">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px">${h(med.name)}${med.strength?` <span style="font-size:11px;color:var(--muted)">${h(med.strength)}</span>`:""}</div>
          <div style="font-size:11px;color:var(--muted)">${med.count} ${h(med.unit)}</div>
        </div>
        <button style="border:none;background:none;cursor:pointer;font-size:14px;padding:2px" onclick="editMed('${med.id}')">✏️</button>
      </div>`;
    });
    html+=`</div></div>`;
  }
  if(!meds.length)html+=`<div style="text-align:center;padding:52px 20px;color:var(--muted)"><div style="font-size:44px;margin-bottom:12px">💊</div><div style="font-weight:600;font-size:15px;margin-bottom:5px">Noch leer</div><div style="font-size:12px">Klicke auf + Hinzufügen</div></div>`;
  el.innerHTML=html;
}

}

// Dreh-Griff aktivieren: Maus/Touch zieht den Kreis → Bild dreht sich
function setupRotDrag(){
  const handle=document.getElementById("rot-handle");
  const img=document.getElementById("ph-img");
  const wrap=document.getElementById("rot-img-wrap");
  if(!handle||!img||!wrap)return;
  let dragging=false;let baseAngle=0;let startMouseAngle=0;
  // Winkel zwischen Bildmitte und Mauszeiger berechnen
  function getMouseAngle(e){
    const rect=wrap.getBoundingClientRect();
    const cx=rect.left+rect.width/2;const cy=rect.top+rect.height/2;
    const mx=e.touches?e.touches[0].clientX:e.clientX;
    const my=e.touches?e.touches[0].clientY:e.clientY;
    return Math.atan2(my-cy,mx-cx)*180/Math.PI;
  }
  handle.onmousedown=handle.ontouchstart=(e)=>{
    dragging=true;baseAngle=window._photoRot||0;startMouseAngle=getMouseAngle(e);
    handle.style.cursor="grabbing";e.preventDefault();e.stopPropagation();
  };
  document.addEventListener("mousemove",function onMove(e){
    if(!dragging)return;
    const delta=getMouseAngle(e)-startMouseAngle;
    window._photoRot=Math.round(baseAngle+delta);
    img.style.transform=`rotate(${window._photoRot}deg)`;
    const inp=document.getElementById("rot-deg-inp");if(inp)inp.value=window._photoRot;
  });
  document.addEventListener("touchmove",function onTouch(e){
    if(!dragging)return;
    const delta=getMouseAngle(e)-startMouseAngle;
    window._photoRot=Math.round(baseAngle+delta);
    img.style.transform=`rotate(${window._photoRot}deg)`;
    const inp=document.getElementById("rot-deg-inp");if(inp)inp.value=window._photoRot;
    e.preventDefault();
  },{passive:false});
  document.addEventListener("mouseup",()=>{if(dragging){dragging=false;handle.style.cursor="grab";}});
  document.addEventListener("touchend",()=>{dragging=false;});
}

// Winkel aus Eingabefeld anwenden
function applyRotDeg(fixedDeg){
  let deg;
  if(fixedDeg!==undefined){
    // +90 oder -90 als relativer Wert
    deg=(window._photoRot||0)+fixedDeg;
  }else{
    const _rv=document.getElementById("rot-deg-inp")?.value??"0";
    deg=parseInt(_rv,10);
    if(isNaN(deg))deg=0;
  }
  window._photoRot=deg;
  const img=document.getElementById("ph-img");if(img)img.style.transform=`rotate(${deg}deg)`;
  const inp=document.getElementById("rot-deg-inp");if(inp)inp.value=deg;
}

// Rotation als Pixel auf das Bild anwenden und speichern
function commitPhotoRot(){
  const medId=window._photoMedId;const idx=window._photoIdx||0;const rot=window._photoRot||0;
  if(rot===0){closeModal();if(currentView==="list")renderList();return;}
  const med=meds.find(m=>m.id===medId);if(!med)return;
  const photos=med.photos&&med.photos.length?[...med.photos]:(med.photo?[med.photo]:[]);
  if(!photos[idx]){closeModal();return;}
  const img2=new Image();img2.onload=()=>{
    const c=document.createElement("canvas");
    const abs=Math.abs(rot%360);
    if(abs===90||abs===270){c.width=img2.height;c.height=img2.width;}
    else{c.width=img2.width;c.height=img2.height;}
    const ctx=c.getContext("2d");ctx.translate(c.width/2,c.height/2);ctx.rotate(rot*Math.PI/180);ctx.drawImage(img2,-img2.width/2,-img2.height/2);
    photos[idx]=c.toDataURL("image/jpeg",.88);
    const mainP=photos[window._mainPhotoIdx||0]||photos[0];
    meds=meds.map(m=>m.id===medId?{...m,photos,photo:mainP,photoCropped:true}:m);
    save();window._photoRot=0;closeModal();if(currentView==="list")renderList();
    toast("Rotation gespeichert ✓");
  };img2.src=photos[idx];
}

// Foto aus Galerie löschen (bleibt in Galerie, springt NICHT zur Eingabemaske)
function deleteCurrentPhoto(){
  const medId=window._photoMedId;const idx=window._photoIdx||0;
  const med=meds.find(m=>m.id===medId);if(!med)return;
  const photos=med.photos&&med.photos.length?[...med.photos]:(med.photo?[med.photo]:[]);
  photos.splice(idx,1);
  window._photoIdx=Math.max(0,Math.min(idx,photos.length-1));
  if(window._mainPhotoIdx>=photos.length)window._mainPhotoIdx=0;
  const mainPD=photos[window._mainPhotoIdx||0]||photos[0]||null;
  meds=meds.map(m=>m.id===medId?{...m,photos,photo:mainPD}:m);
  save();
  if(photos.length===0){
    // Keine Fotos mehr: Galerie schließen (NICHT zur Formular-Ansicht springen)
    closeModal();if(currentView==="list")renderList();
  }else{
    // Weitere Fotos vorhanden: in Galerie bleiben
    renderPhotoGallery();
  }
  toast("Foto gelöscht","warn");
}

// Zuschneiden-UI
function cropPhotoUI(){
  const medId=window._photoMedId;const idx=window._photoIdx||0;
  const med=meds.find(m=>m.id===medId);if(!med)return;
  const photos=med.photos&&med.photos.length?[...med.photos]:(med.photo?[med.photo]:[]);
  const src=photos[idx];
  const handles=["nw","n","ne","e","se","s","sw","w"];
  const hCur={nw:"nw-resize",n:"n-resize",ne:"ne-resize",e:"e-resize",se:"se-resize",s:"s-resize",sw:"sw-resize",w:"w-resize"};
  const hPos={nw:"top:-5px;left:-5px",n:"top:-5px;left:calc(50% - 5px)",ne:"top:-5px;right:-5px",e:"top:calc(50% - 5px);right:-5px",se:"bottom:-5px;right:-5px",s:"bottom:-5px;left:calc(50% - 5px)",sw:"bottom:-5px;left:-5px",w:"top:calc(50% - 5px);left:-5px"};
  const hHtml=handles.map(k=>`<div data-handle="${k}" style="position:absolute;width:11px;height:11px;background:var(--accent);border:2px solid #fff;border-radius:2px;cursor:${hCur[k]};${hPos[k]};z-index:10;touch-action:none"></div>`).join("");
  openModal(`<div>
    <div style="font-weight:700;font-size:14px;margin-bottom:6px">✂️ Zuschneiden</div>
    <div style="position:relative;overflow:hidden;margin-bottom:10px;touch-action:none;background:#000;border-radius:8px" id="crop-wrap">
      <img id="crop-img" src="${src}" style="max-width:100%;max-height:55vh;display:block;user-select:none;pointer-events:none"/>
      <div id="crop-sel" style="position:absolute;border:2px solid var(--accent);background:rgba(37,99,235,.07);top:10%;left:10%;width:80%;height:80%;box-sizing:border-box;touch-action:none">${hHtml}
        <div data-handle="move" style="position:absolute;inset:0;cursor:move;touch-action:none"></div>
      </div>
      <div id="crop-dim" style="position:absolute;top:4px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;pointer-events:none"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary" onclick="applyCrop('${medId}',${idx})">✂️ Speichern</button>
      <button class="btn" onclick="renderPhotoGallery()">Abbrechen</button>
    </div>
  </div>`,"center-overlay");
  setTimeout(()=>{
    const wrap=document.getElementById("crop-wrap");const sel=document.getElementById("crop-sel");
    const img=document.getElementById("crop-img");const dim=document.getElementById("crop-dim");
    if(!wrap||!sel||!img)return;
    let action=null,sx=0,sy=0,sr={};
    const getRect=()=>({x:sel.offsetLeft,y:sel.offsetTop,w:sel.offsetWidth,h:sel.offsetHeight});
    const setRect=(x,y,w,hh)=>{const pw=wrap.offsetWidth,ph=wrap.offsetHeight;x=Math.max(0,Math.min(pw-20,x));y=Math.max(0,Math.min(ph-20,y));w=Math.max(20,Math.min(pw-x,w));hh=Math.max(20,Math.min(ph-y,hh));sel.style.left=x+"px";sel.style.top=y+"px";sel.style.width=w+"px";sel.style.height=hh+"px";if(dim)dim.textContent=Math.round(w*(img.naturalWidth/img.offsetWidth))+" × "+Math.round(hh*(img.naturalHeight/img.offsetHeight))+" px";};
    const onDown=e=>{const t=e.target.closest("[data-handle]");if(!t)return;action=t.dataset.handle;sx=e.touches?e.touches[0].clientX:e.clientX;sy=e.touches?e.touches[0].clientY:e.clientY;sr=getRect();e.preventDefault();e.stopPropagation();};
    const onMove=e=>{if(!action)return;const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;const dx=cx-sx,dy=cy-sy;let{x,y,w,h}=sr;if(action==="move"){setRect(x+dx,y+dy,w,h);return;}if(action.includes("e"))w+=dx;if(action.includes("s"))h+=dy;if(action.includes("w")){w-=dx;x+=dx;}if(action.includes("n")){h-=dy;y+=dy;}setRect(x,y,w,h);e.preventDefault();};
    const onUp=()=>{action=null;};
    sel.addEventListener("mousedown",onDown);sel.addEventListener("touchstart",onDown,{passive:false});
    document.addEventListener("mousemove",onMove);document.addEventListener("touchmove",onMove,{passive:false});
    document.addEventListener("mouseup",onUp);document.addEventListener("touchend",onUp);
    const r=getRect();if(dim)dim.textContent=Math.round(r.w*(img.naturalWidth/img.offsetWidth||1))+" × "+Math.round(r.h*(img.naturalHeight/img.offsetHeight||1))+" px";
  },150);
}
function applyCrop(medId,idx){
  const img=document.getElementById("crop-img");const sel=document.getElementById("crop-sel");if(!img||!sel)return;
  const ir=img.getBoundingClientRect();const sr=sel.getBoundingClientRect();
  const scX=img.naturalWidth/ir.width;const scY=img.naturalHeight/ir.height;
  const x=(sr.left-ir.left)*scX;const y=(sr.top-ir.top)*scY;const w=sr.width*scX;const h2=sr.height*scY;
  const c=document.createElement("canvas");c.width=w;c.height=h2;c.getContext("2d").drawImage(img,x,y,w,h2,0,0,w,h2);
  const newSrc=c.toDataURL("image/jpeg",.88);
  const med=meds.find(m=>m.id===medId);if(!med)return;
  const photos=med.photos&&med.photos.length?[...med.photos]:(med.photo?[med.photo]:[]);
  photos[idx]=newSrc;const mainP=photos[window._mainPhotoIdx||0]||photos[0];
  meds=meds.map(m=>m.id===medId?{...m,photos,photo:mainP}:m);
  save();window._photoIdx=idx;window._photoRot=0;if(currentView==="list")renderList();renderPhotoGallery();toast("Zugeschnitten ✓");
}
